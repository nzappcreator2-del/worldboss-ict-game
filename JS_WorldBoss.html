<style>
    /* ==========================================
     * RPG World Boss Custom Styles & Animations
     * ========================================== */
    
    @keyframes shake-rpg {
        0% { transform: translate(2px, 1px) rotate(0deg) scale(1.1); }
        10% { transform: translate(-1px, -2px) rotate(-1deg) scale(1.1); }
        20% { transform: translate(-3px, 0px) rotate(1deg) scale(1.1); }
        30% { transform: translate(0px, 2px) rotate(0deg) scale(1.1); }
        40% { transform: translate(2px, -1px) rotate(1deg) scale(1.1); }
        50% { transform: translate(-1px, 2px) rotate(-1deg) scale(1.1); }
        60% { transform: translate(-3px, 1px) rotate(0deg) scale(1.1); }
        70% { transform: translate(2px, 1px) rotate(-1deg) scale(1.1); }
        80% { transform: translate(-1px, -1px) rotate(1deg) scale(1.1); }
        90% { transform: translate(2px, 2px) rotate(0deg) scale(1.1); }
        100% { transform: translate(1px, -2px) rotate(-1deg) scale(1.1); }
    }
    
    .animate-shake-rpg {
        animation: shake-rpg 0.4s ease-in-out;
    }

    .boss-card-glow {
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .boss-card-glow:hover {
        box-shadow: 0 0 30px rgba(139, 92, 246, 0.45);
        border-color: #a78bfa !important;
    }
</style>

<script>
    /**
     * ==========================================
     * ระบบเวิลด์บอส AI ตรวจจับท่าทาง (World Boss Motion-Based)
     * ==========================================
     */
    
    // สถานะและการตั้งค่ากล้อง/บอส
    let wbPose = null;
    let wbCamera = null;
    let wbCurrentBoss = null;
    let wbGameState = 'LOBBY'; // LOBBY, PREPARING, COUNTDOWN, BATTLE, VICTORY
    
    // ตรรกะการออกกำลังกาย
    let wbRepsCount = 0;
    let wbTargetReps = 10;
    let wbBossHp = 100;
    let wbBossMaxHp = 100;
    let wbPoseState = 'UP'; // UP/DOWN สำหรับ Squat, CLOSED/OPENED สำหรับ Jumping Jack
    
    // จับเวลาการเล่น (Stopwatch)
    let wbStartTime = 0;
    let wbElapsedTime = 0;
    let wbTimerInterval = null;
    
    // ตรรกะตรวจเช็ค Bounding Box (การยืนของผู้เล่น)
    let wbStandingTimer = null;
    let wbCountdownValue = 3;
    let wbCountdownTimer = null;
    let wbIsUserInPosition = false;
    
    // เอฟเฟกต์การโจมตี (Floating Slash Particles บน Canvas)
    let wbActiveSlashEffects = [];
    
    // ลิสต์ประมวลผลวิดีโอ
    let wbVideoEl = null;
    let wbCanvasEl = null;
    let wbCanvasCtx = null;
    let wbStream = null;

    // 🎮 ตัวแปรควบคุมระบบจำลองผู้กล้า (Simulator Mode)
    let wbIsSimulatorMode = false;
    let wbSimulatorAnimId = null;
    let wbSimulatorAngle = 180; // องศาของข้อต่อจำลอง (เข่าย่อ หรือ แขนกาง)
    let wbSimulatorTargetAngle = 180; // มุมเป้าหมายสำหรับความสมูทสมจริง

    /**
     * 🚪 ฟังก์ชันเมื่อเข้าสู่โหมดเวิลด์บอส (เรียกจากหน้าหลัก)
     */
    function enterWorldBossMode() {
        console.log('TRACE: [enterWorldBossMode] เริ่มต้นเปิดโหมด World Boss');
        showPage('world-boss');
        
        // ซ่อนส่วนบอร์ดอันดับและเปลี่ยนหน้าจอกลับมาหน้าล็อบบี้
        document.getElementById('wb-lobby').classList.remove('hidden');
        document.getElementById('wb-battle').classList.add('hidden');
        document.getElementById('wb-victory-modal').classList.add('hidden');
        document.getElementById('wb-leaderboard-container').classList.add('hidden');
        
        wbGameState = 'LOBBY';
        
        // แสดงข้อความโหลดรอ
        const listContainer = document.getElementById('wb-boss-list');
        listContainer.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center p-12 text-white">
                <div class="inline-block w-10 h-10 border-4 border-purple-300 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                <p class="font-bold text-purple-200">🔮 กำลังเปิดประตูมิติและอัญเชิญมินิเกม...</p>
            </div>
        `;
        
        // เรียกดึงข้อมูลการตั้งค่าบอสทั้งหมดจาก Google Sheets API
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res.success) {
                        renderWorldBossLobby(res.data);
                    } else {
                        customAlert('โหลดข้อมูลบอสล้มเหลว: ' + res.error, 'error');
                        showPage('lobby');
                    }
                })
                .withFailureHandler(function(err) {
                    customAlert('เชื่อมต่อฐานข้อมูลเวิลด์บอสล้มเหลว', 'error');
                    showPage('lobby');
                })
                .getWorldBossConfig();
        } else {
            // โหมดทดสอบ Local/Offline Sandbox
            setTimeout(() => {
                const mockBosses = [
                    { id: 'WB001', name: 'ผจญภัยกับมาริโอ้', poseType: 'mario_fitness', targetReps: 10, maxHp: 100, rewardCoins: 100, rewardXp: 120 },
                    { id: 'WB002', name: 'ศึกผู้พิทักษ์ดวงดาว (Star Guardian)', poseType: 'jumping_jack', targetReps: 15, maxHp: 150, rewardCoins: 150, rewardXp: 150 }
                ];
                renderWorldBossLobby(mockBosses);
            }, 1000);
        }
    }

    /**
     * 🎨 เรนเดอร์รายการบอสที่ได้จากเซิร์ฟเวอร์
     */
    function renderWorldBossLobby(bosses) {
        const listContainer = document.getElementById('wb-boss-list');
        if (bosses.length === 0) {
            listContainer.innerHTML = `
                <div class="col-span-full text-center text-gray-300 p-8 rpg-box bg-slate-900 border-4 border-slate-700 rounded-3xl">
                    ⚔️ ขณะนี้เวิลด์บอสทั้งหมดกำลังพักฟื้นพลัง! โปรดกลับมาท้าทายใหม่ในภายหลัง
                </div>
            `;
            return;
        }
        
        let html = '';
        bosses.forEach(boss => {
            // ค้นหาสถิติเวลาส่วนตัวใน LocalStorage เพื่อเอามาโชว์ทันทีแบบรวดเร็ว
            const localPB = localStorage.getItem(`wb_best_time_${currentUser ? currentUser.id : 'local'}_${boss.id}`);
            const pbDisplay = localPB ? `🔥 เวลาที่ดีที่สุด: <span class="text-yellow-400 font-black">${parseFloat(localPB).toFixed(2)}s</span>` : '⏳ ยังไม่มีสถิติ';
            
            let displayName = boss.name;
            let poseLabel = '';
            let bossDesc = '';
            let emoji = '';
            let cardBorderColor = '';
            let badgeBg = '';
            let textGlow = '';
            
            if (boss.id === 'WB001' || boss.poseType === 'mario_fitness') {
                displayName = 'ผจญภัยกับมาริโอ้ (Super Mario Bros)';
                poseLabel = '🍄 ผจญภัยมาริโอ้ (Mario Fitness)';
                bossDesc = 'ออกกำลังกายสไตล์เกมยุค 8-bit! 🏃‍♂️ ทำท่าวิ่งแถวเอว/พุงเพื่อเดินหน้า, 🦘 กระโดดเพื่อหลบ Bowser และเก็บเหรียญทองสุดหรรษา!';
                emoji = '🍄';
                cardBorderColor = 'border-red-500/80 shadow-[0_0_20px_rgba(239,68,68,0.25)]';
                badgeBg = 'bg-red-950/80 text-red-300 border-red-800/80';
                textGlow = 'text-red-400';
            } else if (boss.id === 'WB002' || boss.poseType === 'jumping_jack') {
                displayName = 'ศึกผู้พิทักษ์ดวงดาว (Star Guardian)';
                poseLabel = '🌌 ผู้พิทักษ์ดวงดาว (Star Guardian)';
                bossDesc = 'สวมบทอัศวินอวกาศ! ↕️ โยกศีรษะและเอี้ยวคอเพื่อควบคุมทิศทาง บินร่อนหลบลูกระเบิด 💣 และเก็บเพชรวิเศษ 💎 ยิ่งเร็วยิ่งทำสถิติได้ดี!';
                emoji = '🌌';
                cardBorderColor = 'border-cyan-500/80 shadow-[0_0_20px_rgba(6,182,212,0.25)]';
                badgeBg = 'bg-cyan-950/80 text-cyan-300 border-cyan-800/80';
                textGlow = 'text-cyan-400';
            } else {
                poseLabel = '🏋️‍♂️ ท่าออกกำลังกาย (Fitness)';
                bossDesc = 'ท้าทายความแข็งแกร่งด้วยการออกกำลังกายตรวจจับท่าทางด้วย AI สู้กับระบบบอสโลกเพื่อเอาชนะสถิติของห้องเรียน!';
                emoji = '⚔️';
                cardBorderColor = 'border-purple-600/80 shadow-[0_0_20px_rgba(147,51,234,0.25)]';
                badgeBg = 'bg-purple-950/80 text-purple-300 border-purple-800/80';
                textGlow = 'text-purple-400';
            }
            
            // แทนที่ชื่อบอสเพื่อส่งต่อไปหน้าเล่นเกมด้วยชื่อใหม่
            const bossToStart = { ...boss, name: displayName };
            
            html += `
                <div class="rpg-box bg-slate-900/95 text-white p-6 rounded-3xl border-4 ${cardBorderColor} flex flex-col justify-between relative overflow-hidden transition-all duration-300 hover:scale-[1.01]">
                    <div class="absolute inset-0 bg-gradient-to-tr from-slate-950/40 via-slate-900/40 to-transparent pointer-events-none"></div>
                    <div class="relative z-10 flex gap-4 items-start">
                        <div class="text-6xl drop-shadow-md select-none">${emoji}</div>
                        <div class="flex-1">
                            <span class="${badgeBg} text-[10px] font-black uppercase px-2.5 py-1 rounded-full border tracking-wider shadow-inner">MINI-GAME</span>
                            <h3 class="font-black text-xl md:text-2xl mt-1.5 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] ${textGlow}">${displayName}</h3>
                            <p class="text-gray-400 font-bold text-xs mt-1.5 flex items-center gap-1">
                                <span>🎯 เงื่อนไข:</span> 
                                <span class="text-emerald-400 font-extrabold bg-emerald-950/40 border border-emerald-800/40 px-2 py-0.5 rounded">${poseLabel} ${boss.targetReps} ครั้ง</span>
                            </p>
                            <p class="text-xs text-gray-300 font-medium mt-3 leading-relaxed border-t border-slate-800/50 pt-2.5">
                                ${bossDesc}
                            </p>
                        </div>
                    </div>
                    
                    <!-- ของรางวัลและการแสดงผลสถิติ -->
                    <div class="relative z-10 mt-6 grid grid-cols-2 gap-3 border-t border-b border-slate-800 py-3 mb-6 bg-slate-950/40 px-3 rounded-2xl border border-slate-800/30">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">รางวัลเมื่อพิชิต</span>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <span class="text-sm">🪙</span><span class="text-xs font-black text-yellow-400">+${boss.rewardCoins}</span>
                                <span class="text-sm">⭐</span><span class="text-xs font-black text-indigo-400">+${boss.rewardXp} XP</span>
                            </div>
                        </div>
                        <div class="flex flex-col text-right justify-center">
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">บันทึกของท่าน</span>
                            <div class="text-xs font-bold text-gray-300 mt-0.5">${pbDisplay}</div>
                        </div>
                    </div>
                    
                    <!-- ปุ่มเริ่มเล่น และปุ่มอันดับ -->
                    <div class="relative z-10 flex gap-3">
                        <button onclick="startWorldBossBattle(${JSON.stringify(bossToStart).replace(/"/g, '&quot;')})" 
                                class="flex-1 py-3 bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-400 hover:to-indigo-500 text-white font-black text-center rounded-xl shadow-lg border-b-4 border-indigo-800 active:border-b-0 cursor-pointer transform hover:scale-[1.02] transition">
                            ⚔️ เล่นเกมส์
                        </button>
                        <button onclick="showWorldBossLeaderboard('${boss.id}')" 
                                class="px-4 py-3 bg-slate-800 hover:bg-slate-700 text-white font-black rounded-xl border-b-4 border-slate-950 active:border-b-0 cursor-pointer transition flex items-center justify-center">
                            🏆 อันดับ
                        </button>
                    </div>
                </div>
            `;
        });
        
        listContainer.innerHTML = html;
    }

    /**
     * 🏆 ดึงตารางอันดับของบอสแต่ละตัว
     */
    function showWorldBossLeaderboard(bossId) {
        const container = document.getElementById('wb-leaderboard-container');
        container.classList.remove('hidden');
        
        const titleEl = document.getElementById('wb-leaderboard-title');
        titleEl.innerHTML = `🏆 ทำเนียบสถิติที่ดีที่สุด (Top 10) - กำลังดึงข้อมูล...`;
        
        const bodyEl = document.getElementById('wb-leaderboard-body');
        bodyEl.innerHTML = `
            <tr>
                <td colspan="5" class="p-6 text-center text-gray-500 font-bold">
                    <div class="inline-block w-6 h-6 border-2 border-purple-300 border-t-purple-600 rounded-full animate-spin mr-2 align-middle"></div>
                    กำลังดาวน์โหลดทำเนียบผู้กล้าจากหอเกียรติยศหลังบ้าน...
                </td>
            </tr>
        `;
        
        // ม้วนหน้าจอลงมาที่ตารางผู้นำอย่างนุ่มนวล
        container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res.success) {
                        titleEl.innerHTML = `🏆 ทำเนียบสถิติที่ดีที่สุด (Top 10) - ${res.bossName || 'World Boss'}`;
                        if (!res.data || res.data.length === 0) {
                            bodyEl.innerHTML = `
                                <tr>
                                    <td colspan="5" class="p-8 text-center text-gray-500 italic">
                                        ยังไม่มีผู้กล้าคนใดพิชิตบอสตัวนี้สำเร็จ! 🚀<br>
                                        <span class="text-xs text-purple-400 font-bold font-prompt">จงเป็นคนแรกที่เอาชนะและฝากชื่อจารึกไว้ในประวัติศาสตร์!</span>
                                    </td>
                                </tr>
                            `;
                            return;
                        }
                        
                        let html = '';
                        res.data.forEach((row, index) => {
                            const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                            
                            // ไฮไลต์แถวของตัวเอง
                            const isMe = currentUser && String(row.userId) === String(currentUser.id);
                            const rowClass = isMe ? 'bg-yellow-100/90 font-extrabold border-l-4 border-yellow-500 text-yellow-950' : 'hover:bg-purple-50/50';
                            
                            html += `
                                <tr class="${rowClass} transition duration-150">
                                    <td class="p-3 text-center text-base">${medal}</td>
                                    <td class="p-3 font-black">${row.name} ${isMe ? ' (คุณ)' : ''}</td>
                                    <td class="p-3 text-center">${row.className}</td>
                                    <td class="p-3 text-right text-purple-700 font-mono font-black">${row.bestTime.toFixed(2)}</td>
                                    <td class="p-3 text-center text-xs text-gray-400 font-bold">${row.date}</td>
                                </tr>
                            `;
                        });
                        bodyEl.innerHTML = html;
                    } else {
                        bodyEl.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">❌ โหลดข้อมูลผิดพลาด: ${res.error}</td></tr>`;
                    }
                })
                .withFailureHandler(function(err) {
                    bodyEl.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">❌ เกิดข้อผิดพลาดในการติดต่อเซิร์ฟเวอร์</td></tr>`;
                })
                .getWorldBossLeaderboard(bossId);
        } else {
            // โหมดทดสอบ Local/Offline Sandbox
            setTimeout(() => {
                titleEl.innerHTML = `🏆 ทำเนียบสถิติที่ดีที่สุด (Top 10) - บอสจำลอง`;
                const mockLB = [
                    { userId: 'U1', name: 'สมชาย นักรบสายย่อ', className: 'ป.5/2', bestTime: 12.35, date: '2026-05-22' },
                    { userId: 'U2', name: 'สมหญิง สปีดสควอท', className: 'ป.4/1', bestTime: 14.88, date: '2026-05-22' }
                ];
                let html = '';
                mockLB.forEach((row, index) => {
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : `${index + 1}`;
                    html += `
                        <tr class="hover:bg-purple-50/50">
                            <td class="p-3 text-center">${medal}</td>
                            <td class="p-3 font-bold">${row.name}</td>
                            <td class="p-3 text-center">${row.className}</td>
                            <td class="p-3 text-right text-purple-700 font-mono font-bold">${row.bestTime.toFixed(2)}</td>
                            <td class="p-3 text-center text-xs text-gray-400">${row.date}</td>
                        </tr>
                    `;
                });
                bodyEl.innerHTML = html;
            }, 500);
        }
    }

    // 🌐 ที่อยู่ URL หน้า World Boss ที่โฮสต์บนระบบภายนอก (เช่น GitHub Pages, Vercel หรือ Firebase)
    // สำหรับการหลีกเลี่ยง iframe sandbox ทำให้สิทธิ์กล้องบนมือถือ iOS/Android ทำงานได้สมบูรณ์แบบ 100%
    // 👉 สามารถแก้ไขลิงก์นี้เป็นที่อยู่อภิมหาเกียรติยศหลังจากที่ท่านอัปโหลดไฟล์ worldboss.html เรียบร้อยแล้วครับ
    const WORLD_BOSS_EXTERNAL_URL = "https://nzappcreator2-del.github.io/worldboss-ict-game/worldboss.html";

    /**
     * ⚔️ เริ่มต้นหน้าจอต่อสู้เวิลด์บอส (Decoupled External Mode)
     */
    function startWorldBossBattle(boss) {
        console.log('TRACE: [startWorldBossBattle] เริ่มท้าทายบอสแบบแยกส่วนภายนอก:', boss.name);
        
        // ดึง Web App URL ปัจจุบันแบบไดนามิก เพื่อให้หน้าภายนอกส่งผลคะแนนกลับหลังบ้านได้ถูกต้อง
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            // แสดงสถานะสปินเนอร์เพื่อความสวยงามในขณะรอสร้างประตูเชื่อมต่อ
            const listContainer = document.getElementById('wb-boss-list');
            const originalContent = listContainer.innerHTML;
            listContainer.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center p-12 text-white">
                    <div class="inline-block w-10 h-10 border-4 border-purple-300 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                    <p class="font-bold text-purple-200">🔮 กำลังเปิดประตูมิติสมรภูมิรบภายนอกและเชื่อมต่อ API...</p>
                </div>
            `;
            
            google.script.run
                .withSuccessHandler(function(webAppUrl) {
                    listContainer.innerHTML = originalContent;
                    
                    // สร้าง URL ส่งข้อมูลไปยัง GitHub Pages/External Host แบบปลอดภัย
                    const targetUrl = WORLD_BOSS_EXTERNAL_URL + 
                        "?userId=" + encodeURIComponent(currentUser ? currentUser.id : "U-LOCAL") +
                        "&userName=" + encodeURIComponent(currentUser ? currentUser.name : "ผู้กล้าไร้นาม") +
                        "&className=" + encodeURIComponent(currentUser ? currentUser.class : "ป.5/1") +
                        "&bossId=" + encodeURIComponent(boss.id) +
                        "&bossName=" + encodeURIComponent(boss.name) +
                        "&poseType=" + encodeURIComponent(boss.poseType) +
                        "&targetReps=" + encodeURIComponent(boss.targetReps) +
                        "&maxHp=" + encodeURIComponent(boss.maxHp) +
                        "&rewardCoins=" + encodeURIComponent(boss.rewardCoins) +
                        "&rewardXp=" + encodeURIComponent(boss.rewardXp) +
                        "&webAppUrl=" + encodeURIComponent(webAppUrl);
                    
                    // เปิดหน้าต่างแท็บใหม่ไปที่สมรภูมิรบ เพื่อเชื่อมกล้องจริงบนมือถือได้
                    window.open(targetUrl, "_blank");

                    listContainer.innerHTML = originalContent;

                })
                .getScriptUrl();
        } else {
            // โหมดจำลอง Local/Offline Development
            const targetUrl = "worldboss.html" + 
                "?userId=U-MOCK" +
                "&userName=" + encodeURIComponent("สมรภูมิ ม็อค") +
                "&className=" + encodeURIComponent("ป.5/2") +
                "&bossId=" + encodeURIComponent(boss.id) +
                "&bossName=" + encodeURIComponent(boss.name) +
                "&poseType=" + encodeURIComponent(boss.poseType) +
                "&targetReps=" + encodeURIComponent(boss.targetReps) +
                "&maxHp=" + encodeURIComponent(boss.maxHp) +
                "&rewardCoins=" + encodeURIComponent(boss.rewardCoins) +

            window.open(targetUrl, "_blank");
        }
    }

    /**

     */
    async function initWebcamAndPose() {
        wbVideoEl = document.getElementById('wb-video');
        wbCanvasEl = document.getElementById('wb-canvas');
        wbCanvasCtx = wbCanvasEl.getContext('2d');
        
        // กำหนดความละเอียดคงที่ของ Canvas
        wbCanvasEl.width = 640;
        wbCanvasEl.height = 480;
        
        // สร้างอินสแตนซ์โมเดล MediaPipe Pose (ถ้ายังไม่มี)
        if (!wbPose) {
            wbPose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                }
            });
            
            wbPose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.55,
                minTrackingConfidence: 0.55
            });
            
            wbPose.onResults(onPoseResults);
        }
        
        // ขอเปิดกล้องถ่ายภาพผู้เล่น
        try {
            wbStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: 640,
                    height: 480,
                    facingMode: 'user'
                },
                audio: false
            });
            
            wbVideoEl.srcObject = wbStream;
            
            // รอจนวิดีโอโหลด Metadata เสร็จและเริ่มเล่นเพื่อไม่ให้เกิดข้อผิดพลาด
            await new Promise((resolve) => {
                wbVideoEl.onloadedmetadata = () => {
                    wbVideoEl.play();
                    resolve();
                };
            });
            
            // เริ่มต้นชุดตรวจจับภาพกล้องโดย MediaPipe Camera Utility
            if (wbCamera) {
                try { await wbCamera.stop(); } catch(e) {}
                wbCamera = null;
            }
            
            wbCamera = new Camera(wbVideoEl, {
                onFrame: async () => {
                    if (wbGameState === 'BATTLE' || wbGameState === 'PREPARING' || wbGameState === 'COUNTDOWN') {
                        try {
                            await wbPose.send({ image: wbVideoEl });
                        } catch(e) {

            wbCamera.start();

    /**
     * 🧠 ฟังก์ชันคำนวณมุมองศาระหว่างจุดเชื่อมต่อข้อต่อ 3 จุด (เช่น Hip-Knee-Ankle)
     */
    function calculateJointAngle(p1, p2, p3, landmarks) {
        const pt1 = landmarks[p1];
        const pt2 = landmarks[p2]; // จุดศูนย์กลาง (ข้อต่อ)
        const pt3 = landmarks[p3];
        
        // เช็คว่าจุดโผล่ออกมามีความชัดเจนมากพอ
        if (!pt1 || !pt2 || !pt3 || pt1.visibility < 0.45 || pt2.visibility < 0.45 || pt3.visibility < 0.45) {
            return null;
        }
        
        // เวกเตอร์ BA
        const ba_x = pt1.x - pt2.x;
        const ba_y = pt1.y - pt2.y;
        
        // เวกเตอร์ BC
        const bc_x = pt3.x - pt2.x;
        const bc_y = pt3.y - pt2.y;
        
        // ผลคูณเชิงสเกลาร์ (Dot Product) และขนาด
        const dotProduct = ba_x * bc_x + ba_y * bc_y;
        const magBA = Math.sqrt(ba_x * ba_x + ba_y * ba_y);
        const magBC = Math.sqrt(bc_x * bc_x + bc_y * bc_y);
        
        if (magBA === 0 || magBC === 0) return null;
        
        // คำนวณหาค่ามุมจาก Cosine
        const cosAngle = dotProduct / (magBA * magBC);
        const clampedCos = Math.max(-1, Math.min(1, cosAngle)); // ป้องกันค่าหลุดช่วง -1 ถึง 1
        const rad = Math.acos(clampedCos);
        return rad * (180 / Math.PI); // แปลงเป็นองศา
    }

    /**
     * 🎥 ฟังก์ชันดักจับผลลัพธ์พิกัดกระดูกจาก MediaPipe AI และเรนเดอร์ภาพบน Canvas
     */
    function onPoseResults(results) {
        if (!wbCanvasCtx || wbGameState === 'LOBBY' || wbGameState === 'VICTORY') return;
        
        const width = wbCanvasEl.width;
        const height = wbCanvasEl.height;
        
        // 1) วาดภาพดั้งเดิมจากกล้องเว็บแคมลงบน Canvas
        wbCanvasCtx.save();
        wbCanvasCtx.clearRect(0, 0, width, height);
        wbCanvasCtx.drawImage(results.image, 0, 0, width, height);
        
        const landmarks = results.poseLandmarks;
        let isPositionOk = false;
        
        // 2) ตรวจสอบและวาดโครงกระดูกในกรณีที่ AI ตรวจพบร่างกายผู้เล่น
        if (landmarks) {
            // วาดเส้นข้อต่อสไตล์นีออนเรืองแสงสะกดสายตา
            wbCanvasCtx.lineWidth = 4;
            wbCanvasCtx.shadowBlur = 10;
            
            const leftSideColor = '#60a5fa';  // นีออนฟ้าน้ำเงิน
            const rightSideColor = '#f472b6'; // นีออนชมพู
            const centerColor = '#a78bfa';    // นีออนม่วง
            
            function drawConnection(p1, p2, color) {
                const pt1 = landmarks[p1];
                const pt2 = landmarks[p2];
                if (pt1 && pt2 && pt1.visibility > 0.45 && pt2.visibility > 0.45) {
                    wbCanvasCtx.beginPath();
                    wbCanvasCtx.moveTo(pt1.x * width, pt1.y * height);
                    wbCanvasCtx.lineTo(pt2.x * width, pt2.y * height);
                    wbCanvasCtx.strokeStyle = color;
                    wbCanvasCtx.shadowColor = color;
                    wbCanvasCtx.stroke();
                }
            }
            
            // แขนซ้าย (ไหล่ -> ศอก -> ข้อมือ)
            drawConnection(11, 13, leftSideColor);
            drawConnection(13, 15, leftSideColor);
            
            // แขนขวา
            drawConnection(12, 14, rightSideColor);
            drawConnection(14, 16, rightSideColor);
            
            // ลำตัวและสะโพก
            drawConnection(11, 12, centerColor);
            drawConnection(12, 24, centerColor);
            drawConnection(24, 23, centerColor);
            drawConnection(23, 11, centerColor);
            
            // ขาซ้าย (สะโพก -> เข่า -> ข้อเท้า)
            drawConnection(23, 25, leftSideColor);
            drawConnection(25, 27, leftSideColor);
            
            // ขาขวา
            drawConnection(24, 26, rightSideColor);
            drawConnection(26, 28, rightSideColor);
            
            // วาดจุดข้อต่อหลักๆ เป็นวงกลมนีออนขาวสว่าง
            const keypoints = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
            keypoints.forEach(idx => {
                const pt = landmarks[idx];
                if (pt && pt.visibility > 0.45) {
                    wbCanvasCtx.beginPath();
                    wbCanvasCtx.arc(pt.x * width, pt.y * height, 6, 0, 2 * Math.PI);
                    wbCanvasCtx.fillStyle = '#ffffff';
                    wbCanvasCtx.shadowColor = '#ffffff';
                    wbCanvasCtx.shadowBlur = 8;
                    wbCanvasCtx.fill();
                }
            });
            
            // 3) ตรวจสอบความถูกต้องของตำแหน่งการยืน (Bounding Box Check)
            // เช็คว่าส่วนหลักๆ มีอยู่บนกล้องและอยู่ในขอบเขต: ไหล่(11,12) สะโพก(23,24) และข้อเท้า(27,28)
            const requiredJoints = [11, 12, 23, 24, 27, 28];
            let visibleCount = 0;
            let insideBoxCount = 0;
            
            // กรอบ Bounding Box ทางแนวตั้งและแนวนอน (ขอบเขตปลอดภัย)
            const minX = 0.15;
            const maxX = 0.85;
            const minY = 0.04;
            const maxY = 0.96;
            
            requiredJoints.forEach(idx => {
                const pt = landmarks[idx];
                if (pt && pt.visibility > 0.45) {
                    visibleCount++;
                    // เช็คพิกัดว่าอยู่ในช่วง 15% - 85% แนวนอน และ 4% - 96% แนวตั้งหรือไม่
                    if (pt.x >= minX && pt.x <= maxX && pt.y >= minY && pt.y <= maxY) {
                        insideBoxCount++;
                    }
                }
            });
            
            // ผู้เล่นยืนตัวอยู่ตรงแนวและเว้นระยะได้ตามกล่องสีเขียวอย่างสมบูรณ์
            isPositionOk = (visibleCount === 6 && insideBoxCount === 6);
            
            // 4) คำนวณตรรกะเกมสู้บอสเมื่อเริ่มเล่นไปแล้ว
            if (wbGameState === 'BATTLE') {
                const poseGuideEl = document.getElementById('wb-battle-pose-guide');
                
                if (wbCurrentBoss.poseType === 'squat') {
                    // คำนวณมุมเข่าทั้งสองข้าง
                    const leftKnee = calculateJointAngle(23, 25, 27, landmarks);
                    const rightKnee = calculateJointAngle(24, 26, 28, landmarks);
                    
                    if (leftKnee !== null && rightKnee !== null) {
                        const avgKneeAngle = (leftKnee + rightKnee) / 2;
                        
                        // เรนเดอร์ตัวเลขมุมเรืองแสงกำกับไว้ข้างเข่าแบบล้ำๆ
                        wbCanvasCtx.fillStyle = '#ffffff';
                        wbCanvasCtx.font = 'black 14px Prompt, sans-serif';
                        wbCanvasCtx.shadowBlur = 4;
                        wbCanvasCtx.shadowColor = '#000000';
                        wbCanvasCtx.fillText(`${Math.round(leftKnee)}°`, landmarks[25].x * width + 10, landmarks[25].y * height);
                        wbCanvasCtx.fillText(`${Math.round(rightKnee)}°`, landmarks[26].x * width + 10, landmarks[26].y * height);
                        
                        if (wbPoseState === 'UP') {
                            poseGuideEl.innerText = "🏋️‍♂️ ท่า Squat: ย่อเข่าตัวลงมาต่ำกว่า 110 องศา";
                            poseGuideEl.className = "text-xs font-bold text-blue-300 mt-2 bg-blue-950/40 border border-blue-800/40 px-3 py-1.5 rounded-xl";
                            
                            // ย่อเข่าลึก
                            if (avgKneeAngle < 110) {
                                wbPoseState = 'DOWN';
                            }
                        } else if (wbPoseState === 'DOWN') {
                            poseGuideEl.innerText = "⚡ ท่า Squat: ยืดตัวขึ้นตรงคืนตำแหน่งเดิม!";
                            poseGuideEl.className = "text-xs font-bold text-yellow-300 mt-2 bg-yellow-950/40 border border-yellow-800/40 px-3 py-1.5 rounded-xl animate-pulse";
                            
                            // ยืดตัวขึ้นตรง
                            if (avgKneeAngle > 155) {
                                wbPoseState = 'UP';
                                handleRepDetected();
                            }
                        }
                    }
                } else if (wbCurrentBoss.poseType === 'jumping_jack') {
                    // ตรวจจับท่ากระโดดตบ
                    const leftWrist = landmarks[15];
                    const rightWrist = landmarks[16];
                    const leftShoulder = landmarks[11];
                    const rightShoulder = landmarks[12];
                    const leftAnkle = landmarks[27];
                    const rightAnkle = landmarks[28];
                    
                    if (leftWrist && rightWrist && leftShoulder && rightShoulder && leftAnkle && rightAnkle &&
                        leftWrist.visibility > 0.45 && rightWrist.visibility > 0.45 &&
                        leftAnkle.visibility > 0.45 && rightAnkle.visibility > 0.45) {
                        
                        const shoulderWidth = Math.abs(leftShoulder.x - rightShoulder.x);
                        const ankleWidth = Math.abs(leftAnkle.x - rightAnkle.x);
                        
                        // ข้อมือยกสูงกว่าระดับไหล่ (ในระบบจอ y ยิ่งน้อย = ยิ่งสูง)
                        const handsHigh = (leftWrist.y < leftShoulder.y && rightWrist.y < rightShoulder.y);
                        // ระยะเท้ากว้างกว่าระยะไหล่ 1.5 เท่า
                        const feetWide = (ankleWidth > shoulderWidth * 1.55);
                        
                        if (wbPoseState === 'CLOSED') {
                            poseGuideEl.innerText = "🌪️ กระโดดตบ: กางแขนชูขึ้นสูง และกางขาออกด้านข้าง!";
                            poseGuideEl.className = "text-xs font-bold text-blue-300 mt-2 bg-blue-950/40 border border-blue-800/40 px-3 py-1.5 rounded-xl";
                            
                            if (handsHigh && feetWide) {
                                wbPoseState = 'OPENED';
                            }
                        } else if (wbPoseState === 'OPENED') {
                            poseGuideEl.innerText = "⚡ กระโดดตบ: หุบแขนและเท้ากลับเข้าที่ตรงเดิม!";
                            poseGuideEl.className = "text-xs font-bold text-yellow-300 mt-2 bg-yellow-950/40 border border-yellow-800/40 px-3 py-1.5 rounded-xl animate-pulse";
                            
                            if (!handsHigh && !feetWide) {
                                wbPoseState = 'CLOSED';
                                handleRepDetected();
                            }
                        }
                    }
                }
            }
        }
        
        // 5) วาด Bounding Box ไกด์ไลน์นำสายตาสวยงาม
        wbCanvasCtx.lineWidth = 6;
        wbCanvasCtx.shadowBlur = 15;
        wbCanvasCtx.shadowColor = isPositionOk ? '#10b981' : '#f59e0b';
        wbCanvasCtx.strokeStyle = isPositionOk ? '#10b981' : '#f59e0b';
        wbCanvasCtx.strokeRect(
            0.15 * width, 
            0.04 * height, 
            (0.85 - 0.15) * width, 
            (0.96 - 0.04) * height
        );
        
        // 6) อัปเดตตรรกะการเตรียมยืนในตำแหน่งเพื่อเริ่มนับถอยหลังต่อสู้
        if (wbGameState === 'PREPARING') {
            const statusOverlay = document.getElementById('wb-status-overlay');
            if (isPositionOk) {
                statusOverlay.innerHTML = `✅ ค้นหาระยะสำเร็จ! กรุณายืนนิ่งๆ ในช่องสีเขียวเพื่อรอสัญญาณศึก...`;
                statusOverlay.className = "absolute top-4 left-4 right-4 py-2.5 px-4 rounded-2xl bg-emerald-950/95 backdrop-blur-sm border-2 border-emerald-500 text-center font-bold text-white text-xs md:text-sm shadow-md animate-pulse";
                
                // ถ้ายืนนิ่งอยู่ในกรอบติดต่อกัน 1.5 วินาที จะตัดเข้าสู่นับถอยหลังต่อสู้
                if (!wbStandingTimer) {
                    wbStandingTimer = setTimeout(() => {
                        startCountdownPhase();
                    }, 1500);
                }
            } else {
                statusOverlay.innerHTML = `⚠️ ขยับตัวถอยหลังให้อยู่กึ่งกลาง และให้เห็น ไหล่ สะโพก ข้อเท้า ครบถ้วน`;
                statusOverlay.className = "absolute top-4 left-4 right-4 py-2.5 px-4 rounded-2xl bg-black/90 backdrop-blur-sm border-2 border-amber-500 text-center font-bold text-white text-xs md:text-sm shadow-md animate-pulse";
                
                if (wbStandingTimer) {
                    clearTimeout(wbStandingTimer);
                    wbStandingTimer = null;
                }
            }
        }
        
        // 7) วาดอักขระตัวนับถอยหลังขนาดใหญ่ 3-2-1 ลงบน Canvas
        if (wbGameState === 'COUNTDOWN') {
            wbCanvasCtx.font = "black 140px Mali, Prompt, sans-serif";
            wbCanvasCtx.fillStyle = "#fbbf24";
            wbCanvasCtx.strokeStyle = "#78350f";
            wbCanvasCtx.lineWidth = 12;
            wbCanvasCtx.textAlign = "center";
            wbCanvasCtx.textBaseline = "middle";
            wbCanvasCtx.shadowBlur = 20;
            wbCanvasCtx.shadowColor = "#fbbf24";
            wbCanvasCtx.strokeText(wbCountdownValue + 1, width / 2, height / 2);
            wbCanvasCtx.fillText(wbCountdownValue + 1, width / 2, height / 2);
        }
        
        // 8) วาดพาร์ติเคิลแสดงดาเมจลอยขึ้นเหนือหัว (Floating Damage Slash Text)
        wbActiveSlashEffects.forEach((eff, idx) => {
            wbCanvasCtx.font = `black ${eff.size}px Mali, Prompt, sans-serif`;
            wbCanvasCtx.fillStyle = `rgba(239, 68, 68, ${eff.alpha})`;
            wbCanvasCtx.shadowBlur = 10;
            wbCanvasCtx.shadowColor = '#ef4444';
            wbCanvasCtx.textAlign = 'center';
            wbCanvasCtx.fillText(`💥 -${eff.damage} HP`, eff.x, eff.y);
            
            // อัปเดตตำแหน่งลอยขึ้นและจางหาย
            eff.y -= 2;
            eff.alpha -= 0.045;
            if (eff.alpha <= 0) {
                wbActiveSlashEffects.splice(idx, 1);
            }
        });
        
        wbCanvasCtx.restore();
    }

    /**
     * 🏁 เริ่มต้นสเตจการนับถอยหลัง (COUNTDOWN PHASE)
     */
    function startCountdownPhase() {
        wbGameState = 'COUNTDOWN';
        wbCountdownValue = 3;
        
        const guidePrompt = document.getElementById('wb-guide-prompt');
        guidePrompt.classList.remove('hidden');
        guidePrompt.style.display = 'flex';
        
        const statusOverlay = document.getElementById('wb-status-overlay');
        statusOverlay.innerHTML = `🔥 เตรียมพร้อม! ประตูกำลังเปิด มินิเกมตรวจจับท่าทางกำลังจะเริ่มในทันที`;
        statusOverlay.className = "absolute top-4 left-4 right-4 py-2.5 px-4 rounded-2xl bg-amber-950/95 backdrop-blur-sm border-2 border-amber-500 text-center font-bold text-white text-xs md:text-sm shadow-md animate-pulse";
        
        runCountdownCycle();
    }

    function runCountdownCycle() {
        const guidePrompt = document.getElementById('wb-guide-prompt');
        if (wbCountdownValue > 0) {
            guidePrompt.innerHTML = `🚀 เริ่มบดขยี้ในอีก ${wbCountdownValue}...`;
            wbCountdownValue--;
            wbCountdownTimer = setTimeout(runCountdownCycle, 1000);
        } else {
            guidePrompt.style.display = 'none';
            guidePrompt.classList.add('hidden');
            startActiveBattlePhase();
        }
    }

    /**
     * ⚔️ เริ่มต้นต่อสู้กับบอสจริง (BATTLE ACTIVE)
     */
    function startActiveBattlePhase() {
        wbGameState = 'BATTLE';
        
        const statusOverlay = document.getElementById('wb-status-overlay');
        statusOverlay.innerHTML = `⚔️ บอสปรากฏตัวแล้ว! ทำท่าทางออกกำลังกายให้เร็วและแม่นยำที่สุด! ⚔️`;
        statusOverlay.className = "absolute top-4 left-4 right-4 py-2.5 px-4 rounded-2xl bg-red-950/90 border-2 border-red-500 text-center font-black text-white text-xs md:text-sm shadow-md animate-pulse";
        
        // บันทึกเวลาเริ่มต้นเล่น
        wbStartTime = performance.now();
        
        // ลูปในการดึงเวลา Stopwatch เศษทศนิยม 2 ตำแหน่ง
        if (wbTimerInterval) clearInterval(wbTimerInterval);
        wbTimerInterval = setInterval(() => {
            if (wbGameState === 'BATTLE') {
                wbElapsedTime = (performance.now() - wbStartTime) / 1000;
                document.getElementById('wb-battle-timer').innerText = wbElapsedTime.toFixed(2);
            }
        }, 30);
    }

    /**
     * 🏋️‍♂️ เมื่อตรวจพบผู้เล่นทำท่ากายบริหารสะสมได้สำเร็จ 1 ครั้ง (Rep Completed)
     */
    function handleRepDetected() {
        if (wbGameState !== 'BATTLE') return;
        
        wbRepsCount++;
        
        // ป้องกันค่าเกินยอดทาร์เก็ตบอส
        if (wbRepsCount > wbTargetReps) wbRepsCount = wbTargetReps;
        
        // แสดงผลจำนวนรอบ
        document.getElementById('wb-battle-reps').innerText = `${wbRepsCount} / ${wbTargetReps}`;
        
        // คำนวณดาเมจ
        const damagePerRep = Math.round(wbBossMaxHp / wbTargetReps);
        wbBossHp = Math.max(0, wbBossMaxHp - (wbRepsCount * damagePerRep));
        
        // สั่นรูปอวาตาร์มอนสเตอร์เพื่อมอบความอิมแพคสะใจ
        const bossAvatar = document.getElementById('wb-battle-boss-avatar');
        bossAvatar.classList.add('animate-shake-rpg');
        setTimeout(() => {
            bossAvatar.classList.remove('animate-shake-rpg');
        }, 400);
        
        // อัปเดตแถบพลังชีวิตบอส
        document.getElementById('wb-battle-boss-hp-bar').style.width = `${(wbBossHp / wbBossMaxHp) * 100}%`;
        document.getElementById('wb-battle-boss-hp-text').innerText = `${wbBossHp} / ${wbBossMaxHp} HP`;
        
        // สปอนพาร์ติเคิลคำดาเมจเรืองแสงบน Canvas (สุ่มเยื้องกลางจอเล็กน้อยเพื่อให้อ่านง่าย)
        wbActiveSlashEffects.push({
            x: wbCanvasEl.width / 2 + (Math.random() * 80 - 40),
            y: wbCanvasEl.height / 2 - 50 + (Math.random() * 40 - 20),
            damage: damagePerRep,
            size: 38,
            alpha: 1.0
        });
        
        // เช็คการพิชิตเอาชนะบอสได้เมื่อ HP เหลือ 0
        if (wbBossHp <= 0) {
            triggerVictoryPhase();
        }
    }

    /**
     * 🎉 เคลียร์หน้าจอและแสดงหน้าต่างสรุปชัยชนะ (VICTORY modal)
     */
    function triggerVictoryPhase() {
        wbGameState = 'VICTORY';
        
        // ล้างเวลา
        if (wbTimerInterval) clearInterval(wbTimerInterval);
        
        // ปิดกล้องและเคลียร์สายสตรีมเพื่อความประหยัดพลังงาน
        stopMediaStream();
        
        // คำนวณเวลาที่ใช้ทั้งหมด
        const finalTime = Math.round(wbElapsedTime * 100) / 100;
        
        // อัปเดตแสดงหน้า Victory Modal
        document.getElementById('wb-victory-boss-name').innerText = `ผู้สยบ: ${wbCurrentBoss.name}`;
        document.getElementById('wb-victory-time').innerText = finalTime.toFixed(2);
        
        // เตรียมโมเดลข้อมูลเหรียญและ XP
        document.getElementById('wb-victory-reward-coins').innerText = `+${wbCurrentBoss.rewardCoins} เหรียญ`;
        document.getElementById('wb-victory-reward-xp').innerText = `+${wbCurrentBoss.rewardXp} XP`;
        
        // ตั้งค่าเตรียมหน้าต่างสถิติใหม่
        document.getElementById('wb-victory-best-badge').classList.add('hidden');
        document.getElementById('wb-victory-prev-best').innerText = `กำลังบันทึกคะแนน...`;
        
        const victoryModal = document.getElementById('wb-victory-modal');
        victoryModal.classList.remove('hidden');
        victoryModal.classList.add('flex');
        
        // ส่งผลเวลาที่ดีที่สุดเข้าสู่ตาราง Google Sheets API ของระบบส่วนกลาง
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res.success) {
                        // อัปเดตข้อมูลเหรียญและ XP โกลบอลของกระดานผู้ใช้จริง
                        if (res.newCoins !== undefined) currentUser.coins = res.newCoins;
                        if (res.newXp !== undefined) currentUser.xp = res.newXp;
                        
                        // ซิงโครไนซ์อัปเดตสถิติ Dashboard ทันที
                        if (typeof updateDashboardInfo === 'function') {
                            updateDashboardInfo();
                        }
                        
                        // บันทึกลง LocalStorage ช่วยจำ PB รวดเร็ว
                        localStorage.setItem(`wb_best_time_${currentUser.id}_${wbCurrentBoss.id}`, res.bestTime);
                        
                        // แจ้งเตือนสถิติเดิม
                        if (res.previousBest !== null && res.previousBest !== undefined) {
                            document.getElementById('wb-victory-prev-best').innerText = `${res.previousBest.toFixed(2)} วินาที`;
                        } else {
                            document.getElementById('wb-victory-prev-best').innerText = `ยังไม่มีสถิติเดิม`;
                        }
                        
                        // ถ้าทำลายสถิติเก่าหรือได้สถิติแรก ให้ชูป้ายฉลองเกียรติยศ
                        if (res.isPersonalBest) {
                            document.getElementById('wb-victory-best-badge').classList.remove('hidden');
                            
                            // เพิ่มเอฟเฟกต์พลุด้านใน (SweetAlert)
                            try {
                                confetti({
                                    particleCount: 150,
                                    spread: 80,
                                    origin: { y: 0.6 }
                                });
                            } catch(e) {}
                        }
                    } else {
                        document.getElementById('wb-victory-prev-best').innerText = `ผิดพลาด: ${res.error}`;
                    }
                })
                .withFailureHandler(function(err) {
                    document.getElementById('wb-victory-prev-best').innerText = `เชื่อมต่อล้มเหลว`;
                    customAlert('ไม่สามารถเซฟข้อมูลขึ้น Sheets ได้ สถิติจะถูกจัดเก็บบนเครื่องชั่วคราว', 'warning');
                })
                .submitWorldBossScore(currentUser.id, wbCurrentBoss.id, finalTime);
        } else {
            // โหมดจำลองความเร็วออฟไลน์
            setTimeout(() => {
                document.getElementById('wb-victory-prev-best').innerText = `18.50 วินาที`;
                document.getElementById('wb-victory-best-badge').classList.remove('hidden');
                
                // จำลองเพิ่ม XP ใน Local
                if (currentUser) {
                    currentUser.coins += wbCurrentBoss.rewardCoins;
                    currentUser.xp += wbCurrentBoss.rewardXp;
                    if (typeof updateDashboardInfo === 'function') updateDashboardInfo();
                }
                localStorage.setItem(`wb_best_time_local_${wbCurrentBoss.id}`, finalTime);
            }, 800);
        }
    }

    /**
     * 🚪 ปิดกล้องหน้าเวิลด์บอสและกลับสู่หน้าล็อบบี้หลักอย่างปลอดภัย
     */
    function closeWorldBossVictory() {
        document.getElementById('wb-victory-modal').classList.add('hidden');
        document.getElementById('wb-victory-modal').classList.remove('flex');
        
        cleanUpWorldBossGame();
        enterWorldBossMode();
    }

    /**
     * 🏳️ กดยอมแพ้/ถอยทัพ และกู้นำกลับล็อบบี้บอส
     */
    async function confirmLeaveWorldBoss() {
        if (await customConfirm("ผู้กล้าแน่ใจหรือไม่ว่าต้องการหลบหนีและถอยทัพในเวลานี้? (สถิติเวลาในรอบนี้จะไม่ถูกบันทึกและสูญหายจ้า)", "🏳️ ยืนยันการถอยทัพ?")) {
            cleanUpWorldBossGame();
            enterWorldBossMode();
        }
    }

    /**
     * 🧹 เคลียร์และชะล้างสถานะกล้อง/บอสเพื่อไม่ให้กินทรัพยากร
     */
    function cleanUpWorldBossGame() {
        wbGameState = 'LOBBY';
        
        // 🎮 หยุดระบบจำลอง Simulator Mode (ถ้ามีรันอยู่)
        wbIsSimulatorMode = false;
        if (wbSimulatorAnimId) {
            cancelAnimationFrame(wbSimulatorAnimId);
            wbSimulatorAnimId = null;
        }
        window.removeEventListener('keydown', handleSimulatorKeydown);
        
        // ซ่อนแผงควบคุมจำลองสัมผัส
        const simulatorControls = document.getElementById('wb-simulator-controls');
        if (simulatorControls) {
            simulatorControls.classList.add('hidden');
        }
        
        // หยุด Stopwatch
        if (wbTimerInterval) {
            clearInterval(wbTimerInterval);
            wbTimerInterval = null;
        }
        
        // เคลียร์ค้างถอยหลัง
        if (wbCountdownTimer) {
            clearTimeout(wbCountdownTimer);
            wbCountdownTimer = null;
        }
        
        if (wbStandingTimer) {
            clearTimeout(wbStandingTimer);
            wbStandingTimer = null;
        }
        
        // ปิดกล้อง
        stopMediaStream();
        
        document.getElementById('wb-battle').classList.add('hidden');
        document.getElementById('wb-lobby').classList.remove('hidden');
    }

    /**
     * 🛑 สั่งให้หยุดสายสตรีมมีเดียจากกล้องและทำความสะอาด
     */
    function stopMediaStream() {
        if (wbCamera) {
            try {
                wbCamera.stop();
            } catch(e) {
                console.log('Error stopping active MP camera:', e);
            }
            wbCamera = null;
        }
        
        if (wbStream) {
            try {
                wbStream.getTracks().forEach(track => {
                    track.stop();
                    console.log('TRACE: กล้องแทร็กกิ้งปิดการใช้งานเรียบร้อย:', track.label);
                });
            } catch(e) {
                console.log('Error stopping stream tracks:', e);
            }
            wbStream = null;
        }
        
        if (wbVideoEl) {
            wbVideoEl.srcObject = null;
        }
    }

    /**
     * 📷 ฟังก์ชันทดสอบความพร้อมใช้งานของกล้องเว็บแคมผู้เล่น
     */
    async function checkCameraCompatibility() {
        console.log('TRACE: [checkCameraCompatibility] เริ่มต้นการเช็คกล้อง');
        
        try {
            // ดึงสิทธิ์เว็บแคมเบื้องต้น
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            // แสดงผลป๊อปอัปพรีวิวกล้องแบบเรียลไทม์
            SwalRPG.fire({
                title: '📷 กล้องพร้อมใช้งานแล้ว!',
                html: `
                    <div class="flex flex-col items-center gap-3">
                        <p class="text-xs text-gray-500 font-bold font-prompt">ผู้กล้าสามารถปรับแต่งระยะและเช็คความชัดเจนของมุมกล้องได้ด้านล่างนี้</p>
                        <div class="relative w-full max-w-sm rounded-2xl overflow-hidden border-4 border-emerald-500 shadow-md">
                            <video id="wb-preview-video" autoplay playsinline muted 
                                   class="w-full h-48 md:h-64 object-cover transform scale-x-[-1] bg-black"></video>
                        </div>
                        <span class="text-emerald-600 font-black text-sm animate-pulse flex items-center gap-1.5 mt-1 font-prompt">
                            🟢 เชื่อมต่อเสร็จสมบูรณ์ กล้องทำงานได้อย่างดีเยี่ยม!
                        </span>
                    </div>
                `,
                confirmButtonText: '✅ เรียบร้อย พร้อมรบ!',
                didOpen: () => {
                    const videoEl = document.getElementById('wb-preview-video');
                    if (videoEl) {
                        videoEl.srcObject = stream;
                    }
                },
                willClose: () => {
                    // ปิดกล้องเมื่อปิดป๊อปอัป เพื่อถนอมการกินทรัพยากร
                    stream.getTracks().forEach(track => track.stop());
                    console.log('TRACE: [checkCameraCompatibility] ปิดพรีวิวและหยุดแชร์กล้องเรียบร้อย');
                }
            });
            
        } catch (err) {
            console.error('Error accessing webcam:', err);
            let errMsg = 'ไม่สามารถดึงข้อมูลเว็บแคมได้';
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                errMsg = 'ผู้กล้าปฏิเสธสิทธิ์การเข้าถึงกล้องเว็บแคม\n👉 โปรดไปที่การตั้งค่าเว็บเบราว์เซอร์ของท่านเพื่ออนุญาตสิทธิ์การแชร์กล้องครับ';
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                errMsg = 'ไม่พบอุปกรณ์กล้องเว็บแคมเชื่อมต่อกับคอมพิวเตอร์หรือโทรศัพท์ของท่านครับ';
            } else {
                errMsg = errMsg + ': ' + err.message;
            }
            
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                // สำหรับมือถือ: ใช้ native alert เพื่อการันตีแสดงผล 100% เลี่ยงปัญหา iframe
                window.alert(
                    "❌ " + errMsg.replace(/\n/g, ' ') + "\n\n" +
                    "💡 แนะนำให้ผู้กล้ากดปุ่ม [⚔️ ท้าทายบอส] บนหน้าล็อกบี้ เพื่อเลือกเปิดใช้งาน 'โหมดฝึกฝนจำลองเสมือน (Simulator Mode)' ในการร่วมสนุกเล่นเกมต่อโดยไม่ใช้กล้องครับ!"
                );
            } else {
                try {
                    customAlert(errMsg, 'error');
                } catch (alertErr) {
                    window.alert(errMsg);
                }
            }
        }
    }

    /* ==========================================================================
     * 🎮 ระบบจำลองผู้กล้าเสมือน (World Boss Simulator Engine)
     * ========================================================================== */

    /**
     * 🎮 เริ่มต้นการทำงานโหมดฝึกฝนจำลอง (Simulator Mode)
     */
    function startSimulatorMode() {
        console.log('TRACE: [startSimulatorMode] เข้าสู่โหมดจำลองฝึกหัดผู้กล้าเสมือน');
        wbIsSimulatorMode = true;
        
        // หยุดและทำความสะอาดระบบกล้องจริง (ถ้ามีค้าง)
        stopMediaStream();
        
        // เคลียร์ค่าแอนิเมชันเดิม
        if (wbSimulatorAnimId) {
            cancelAnimationFrame(wbSimulatorAnimId);
            wbSimulatorAnimId = null;
        }
        
        // กำหนดความละเอียดคงที่ของ Canvas
        wbCanvasEl = document.getElementById('wb-canvas');
        wbCanvasCtx = wbCanvasEl.getContext('2d');
        wbCanvasEl.width = 640;
        wbCanvasEl.height = 480;
        
        // แสดงข้อความโหมดจำลองเสมือนด้านบนกล้อง
        const statusOverlay = document.getElementById('wb-status-overlay');
        statusOverlay.innerHTML = `🟢 โหมดฝึกฝนจำลองผู้กล้าเสมือน (Simulator Active) กด Spacebar เพื่อขยับ`;
        statusOverlay.className = "absolute top-4 left-4 right-4 py-2.5 px-4 rounded-2xl bg-indigo-950/95 backdrop-blur-sm border-2 border-indigo-500 text-center font-bold text-white text-xs md:text-sm shadow-md animate-pulse z-20";
        
        // เปิดแสดงปุ่มจำลองสำหรับผู้ใช้อุปกรณ์พกพา/สัมผัส
        const simulatorControls = document.getElementById('wb-simulator-controls');
        if (simulatorControls) {
            simulatorControls.classList.remove('hidden');
        }
        
        // กำหนดสถานะและปรับปรุงข้อความบนปุ่มสัมผัสตามท่าของเวิลด์บอส
        const btnText = document.getElementById('wb-sim-btn-text');
        if (wbCurrentBoss.poseType === 'squat') {
            wbPoseState = 'UP';
            wbSimulatorAngle = 180;
            wbSimulatorTargetAngle = 180;
            if (btnText) btnText.innerText = '🏋️‍♂️ ย่อตัวลง (Squat)';
        } else if (wbCurrentBoss.poseType === 'jumping_jack') {
            wbPoseState = 'CLOSED';
            wbSimulatorAngle = 180;
            wbSimulatorTargetAngle = 180;
            if (btnText) btnText.innerText = '🌪️ กางแขนกางขาออก (Jumping Jack)';
        }
        
        // ดักจับ Event กดแป้นพิมพ์ (Spacebar) สำหรับโหมดจำลอง
        window.removeEventListener('keydown', handleSimulatorKeydown);
        window.addEventListener('keydown', handleSimulatorKeydown);
        
        // เริ่มลูปการวาดโครงกระดูกจำลอง Neon บน Canvas
        wbGameState = 'PREPARING';
        drawSimulatorFrame();
        
        // ข้ามขั้นตอนการจัดตำแหน่งจริง ยืนยันตำแหน่งสีเขียวเพื่อเริ่มนับถอยหลังทันทีหลังจากผ่านไป 1.2 วินาที
        if (wbStandingTimer) clearTimeout(wbStandingTimer);
        wbStandingTimer = setTimeout(() => {
            if (wbGameState === 'PREPARING') {
                startCountdownPhase();
            }
        }, 1200);
    }

    /**
     * ⌨️ ฟังก์ชันดักจับคีย์บอร์ด Spacebar ในโหมดจำลอง
     */
    function handleSimulatorKeydown(e) {
        if (!wbIsSimulatorMode || wbGameState !== 'BATTLE') return;
        
        // คีย์ Spacebar (รหัส 32 หรือ " ")
        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault(); // ป้องกันหน้าจอเลื่อนลงมาด้านล่าง
            handleSimulatorAction();
        }
    }

    /**
     * ⚡ ประมวลผลตรรกะการจำลองขยับเข่าหรือแขนขา เมื่อกดปุ่มหรือ Spacebar
     */
    function handleSimulatorAction() {
        if (!wbIsSimulatorMode || wbGameState !== 'BATTLE') return;
        
        const btnText = document.getElementById('wb-sim-btn-text');
        
        if (wbCurrentBoss.poseType === 'squat') {
            if (wbPoseState === 'UP') {
                // ขยับตัวย่อตัวลง
                wbPoseState = 'DOWN';
                wbSimulatorTargetAngle = 90; // เข่าย่อมุมแคบลง
                if (btnText) btnText.innerText = '⚡ ยืดตัวขึ้นตรง (Stand Up)';
            } else if (wbPoseState === 'DOWN') {
                // ขยับตัวยืดขึ้นตรง
                wbPoseState = 'UP';
                wbSimulatorTargetAngle = 180; // เข่ายืดตรง
                if (btnText) btnText.innerText = '🏋️‍♂️ ย่อตัวลง (Squat)';
                
                // นับ Rep ประสบความสำเร็จ!
                handleRepDetected();
            }
        } else if (wbCurrentBoss.poseType === 'jumping_jack') {
            if (wbPoseState === 'CLOSED') {
                // ขยับกางแขนกางขาออกชูขึ้นฟ้า
                wbPoseState = 'OPENED';
                wbSimulatorTargetAngle = 60; // มุมแคบแปลว่าแขนชูสูงกวาดขึ้น
                if (btnText) btnText.innerText = '⚡ หุบแขนหุบขาเข้าที่ (Return)';
            } else if (wbPoseState === 'OPENED') {
                // ขยับหุบแขนขากลับคืนตำแหน่งเดิม
                wbPoseState = 'CLOSED';
                wbSimulatorTargetAngle = 180; // แขนกลับไปขนาบลำตัว
                if (btnText) btnText.innerText = '🌪️ กางแขนกางขาออก (Jumping Jack)';
                
                // นับ Rep ประสบความสำเร็จ!
                handleRepDetected();
            }
        }
    }

    /**
     * 🎨 ลูปแอนิเมชันเรนเดอร์หุ่นกระดูกนีออน 2D ขยับกายจำลองเสมือน
     */
    function drawSimulatorFrame() {
        if (!wbIsSimulatorMode || wbGameState === 'LOBBY' || wbGameState === 'VICTORY') {
            if (wbSimulatorAnimId) {
                cancelAnimationFrame(wbSimulatorAnimId);
                wbSimulatorAnimId = null;
            }
            return;
        }
        
        const width = wbCanvasEl.width;
        const height = wbCanvasEl.height;
        
        wbCanvasCtx.save();
        wbCanvasCtx.clearRect(0, 0, width, height);
        
        // 1) วาดพื้นหลังนีออนไซเบอร์พันก์ (Gradient Space-Neon) หรูหราสุดพลัง
        const bgGrad = wbCanvasCtx.createRadialGradient(width/2, height/2, 20, width/2, height/2, width*0.75);
        bgGrad.addColorStop(0, '#1e1b4b'); // สีน้ำเงินเข้มลึก
        bgGrad.addColorStop(0.5, '#0f172a'); // สีกรมท่าเกือบดำ
        bgGrad.addColorStop(1, '#020617'); // สีดำอวกาศ
        wbCanvasCtx.fillStyle = bgGrad;
        wbCanvasCtx.fillRect(0, 0, width, height);
        
        // วาดเส้นกริดนีออนลึกมีมิติ
        wbCanvasCtx.strokeStyle = 'rgba(99, 102, 241, 0.15)';
        wbCanvasCtx.lineWidth = 1;
        for (let i = 0; i < width; i += 40) {
            wbCanvasCtx.beginPath();
            wbCanvasCtx.moveTo(i, 0);
            wbCanvasCtx.lineTo(i, height);
            wbCanvasCtx.stroke();
        }
        for (let j = 0; j < height; j += 40) {
            wbCanvasCtx.beginPath();
            wbCanvasCtx.moveTo(0, j);
            wbCanvasCtx.lineTo(width, j);
            wbCanvasCtx.stroke();
        }
        
        // 2) อัปเดตทรานซิชันมุมจำลองด้วยความสมูทลื่นไหล (Smooth Interpolation)
        wbSimulatorAngle += (wbSimulatorTargetAngle - wbSimulatorAngle) * 0.18;
        
        // 3) กำหนดพิกัดหุ่นจำลอง Neon Stick Figure (อยู่ตรงกลางจอพอดี)
        const centerX = width / 2;
        const centerY = height / 2 - 15;
        
        // สีสันนีออนแสนสวย
        const spineColor = '#a78bfa';  // ม่วงนีออน
        const leftSideColor = '#60a5fa';  // ฟ้านีออน
        const rightSideColor = '#f472b6'; // ชมพูนีออน
        
        wbCanvasCtx.lineWidth = 6;
        wbCanvasCtx.lineCap = 'round';
        wbCanvasCtx.shadowBlur = 12;
        
        // คำนวณขยับส่วนต่างๆ อ้างอิงตามค่า wbSimulatorAngle และประเภทท่าทาง
        let headY = centerY - 100;
        let torsoY1 = centerY - 70;
        let torsoY2 = centerY + 10;
        let leftHipX = centerX - 18, rightHipX = centerX + 18;
        
        let leftKneeX, leftKneeY, leftAnkleX, leftAnkleY;
        let rightKneeX, rightKneeY, rightAnkleX, rightAnkleY;
        
        let leftElbowX, leftElbowY, leftWristX, leftWristY;
        let rightElbowX, rightElbowY, rightWristX, rightWristY;
        
        if (wbCurrentBoss.poseType === 'squat') {
            // สัดส่วนย่อสะโพกลำตัวลงตามองศาเข่าจำลอง
            const radKnee = (wbSimulatorAngle * Math.PI) / 180;
            const isSquatting = wbSimulatorAngle < 135;
            
            // สะโพกเลื่อนลงและลำตัวเอนไปข้างหน้าเล็กน้อยตอนย่อตัว
            const heightFactor = Math.sin(radKnee); // 1 ตอนยืน, ~0.8-0.9 ตอนย่อ
            torsoY2 = centerY + 10 + (1 - heightFactor) * 55;
            torsoY1 = centerY - 70 + (1 - heightFactor) * 35;
            headY = centerY - 100 + (1 - heightFactor) * 25;
            
            // พิกัดสะโพก
            leftHipX = centerX - 18;
            rightHipX = centerX + 18;
            
            // ข้อเท้าคงที่อยู่บนพื้นสนาม
            leftAnkleX = centerX - 25; leftAnkleY = centerY + 115;
            rightAnkleX = centerX + 25; rightAnkleY = centerY + 115;
            
            // คำนวณพิกัดเข่าตามคณิตศาสตร์พับข้อเข่าอย่างเนียน
            const kneeOffset = (1 - heightFactor) * 35;
            leftKneeX = centerX - 35 - kneeOffset;
            leftKneeY = torsoY2 + (leftAnkleY - torsoY2) / 2 + (1 - heightFactor) * 15;
            rightKneeX = centerX + 35 + kneeOffset;
            rightKneeY = leftKneeY;
            
            // ท่ายกแขนชื่นไปข้างหน้าเพื่อพยุงตัวตอน Squat
            leftElbowX = centerX - 45; leftElbowY = torsoY1 + 10 - (isSquatting ? 15 : 0);
            leftWristX = centerX - 75; leftWristY = leftElbowY - (isSquatting ? 25 : 0);
            
            rightElbowX = centerX + 45; rightElbowY = leftElbowY;
            rightWristX = centerX + 75; rightWristY = leftWristY;
            
        } else {
            // jumping_jack
            const radArm = (wbSimulatorAngle * Math.PI) / 180;
            
            // ข้อเท้าเลื่อนขยายออกกว้าง-หุบเข้าหาตัว
            const ankleSpread = (1 - Math.sin(radArm)) * 45;
            leftAnkleX = centerX - 18 - ankleSpread; leftAnkleY = centerY + 115;
            rightAnkleX = centerX + 18 + ankleSpread; rightAnkleY = centerY + 115;
            
            // เข่ายืดตรงตามทิศทางเท้า
            leftKneeX = leftHipX + (leftAnkleX - leftHipX) / 2;
            leftKneeY = torsoY2 + (leftAnkleY - torsoY2) / 2;
            rightKneeX = rightHipX + (rightAnkleX - rightHipX) / 2;
            rightKneeY = leftKneeY;
            
            // แขนกางชูสูงและยกขึ้นฟ้าตามองศาจำลอง
            const armAngle = radArm; // 180 หุบชี้ลง, 60 กางชี้ขึ้นฟ้า
            const armLength = 55;
            
            // ซ้ายชี้ออกไปทางซ้ายตามทรานสฟอร์ม
            leftElbowX = centerX - 25 - Math.sin(armAngle) * (armLength * 0.6);
            leftElbowY = torsoY1 + 10 + Math.cos(armAngle) * (armLength * 0.6);
            leftWristX = centerX - 25 - Math.sin(armAngle) * armLength;
            leftWristY = torsoY1 + 10 + Math.cos(armAngle) * armLength;
            
            // ขวาชี้สลับข้าง
            rightElbowX = centerX + 25 + Math.sin(armAngle) * (armLength * 0.6);
            rightElbowY = torsoY1 + 10 + Math.cos(armAngle) * (armLength * 0.6);
            rightWristX = centerX + 25 + Math.sin(armAngle) * armLength;
            rightWristY = torsoY1 + 10 + Math.cos(armAngle) * armLength;
        }
        
        // 4) วาดชิ้นส่วนร่างกายสไตล์กระดูกนีออนแสนเก๋ไก๋
        
        // 4.1) หัวกลมนีออนขาวสว่างขอบม่วง
        wbCanvasCtx.beginPath();
        wbCanvasCtx.arc(centerX, headY, 20, 0, 2 * Math.PI);
        wbCanvasCtx.fillStyle = '#ffffff';
        wbCanvasCtx.shadowColor = spineColor;
        wbCanvasCtx.shadowBlur = 15;
        wbCanvasCtx.strokeStyle = spineColor;
        wbCanvasCtx.stroke();
        wbCanvasCtx.fill();
        
        // 4.2) กระดูกสันหลัง (หัวไหล่ -> สะโพก)
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX, torsoY1);
        wbCanvasCtx.lineTo(centerX, torsoY2);
        wbCanvasCtx.strokeStyle = spineColor;
        wbCanvasCtx.shadowColor = spineColor;
        wbCanvasCtx.stroke();
        
        // 4.3) กระดูกไหล่ซ้ายและขวา
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX, torsoY1 + 10);
        wbCanvasCtx.lineTo(centerX - 25, torsoY1 + 10);
        wbCanvasCtx.strokeStyle = leftSideColor;
        wbCanvasCtx.shadowColor = leftSideColor;
        wbCanvasCtx.stroke();
        
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX, torsoY1 + 10);
        wbCanvasCtx.lineTo(centerX + 25, torsoY1 + 10);
        wbCanvasCtx.strokeStyle = rightSideColor;
        wbCanvasCtx.shadowColor = rightSideColor;
        wbCanvasCtx.stroke();
        
        // 4.4) แขนซ้าย (ไหล่ -> ศอก -> ข้อมือ)
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX - 25, torsoY1 + 10);
        wbCanvasCtx.lineTo(leftElbowX, leftElbowY);
        wbCanvasCtx.lineTo(leftWristX, leftWristY);
        wbCanvasCtx.strokeStyle = leftSideColor;
        wbCanvasCtx.shadowColor = leftSideColor;
        wbCanvasCtx.stroke();
        
        // 4.5) แขนขวา
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX + 25, torsoY1 + 10);
        wbCanvasCtx.lineTo(rightElbowX, rightElbowY);
        wbCanvasCtx.lineTo(rightWristX, rightWristY);
        wbCanvasCtx.strokeStyle = rightSideColor;
        wbCanvasCtx.shadowColor = rightSideColor;
        wbCanvasCtx.stroke();
        
        // 4.6) กระดูกเชิงกรานสะโพกซ้ายและขวา
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX, torsoY2);
        wbCanvasCtx.lineTo(leftHipX, torsoY2);
        wbCanvasCtx.strokeStyle = leftSideColor;
        wbCanvasCtx.shadowColor = leftSideColor;
        wbCanvasCtx.stroke();
        
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(centerX, torsoY2);
        wbCanvasCtx.lineTo(rightHipX, torsoY2);
        wbCanvasCtx.strokeStyle = rightSideColor;
        wbCanvasCtx.shadowColor = rightSideColor;
        wbCanvasCtx.stroke();
        
        // 4.7) ขาซ้าย (สะโพก -> เข่า -> ข้อเท้า)
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(leftHipX, torsoY2);
        wbCanvasCtx.lineTo(leftKneeX, leftKneeY);
        wbCanvasCtx.lineTo(leftAnkleX, leftAnkleY);
        wbCanvasCtx.strokeStyle = leftSideColor;
        wbCanvasCtx.shadowColor = leftSideColor;
        wbCanvasCtx.stroke();
        
        // 4.8) ขาขวา
        wbCanvasCtx.beginPath();
        wbCanvasCtx.moveTo(rightHipX, torsoY2);
        wbCanvasCtx.lineTo(rightKneeX, rightKneeY);
        wbCanvasCtx.lineTo(rightAnkleX, rightAnkleY);
        wbCanvasCtx.strokeStyle = rightSideColor;
        wbCanvasCtx.shadowColor = rightSideColor;
        wbCanvasCtx.stroke();
        
        // 4.9) วาดจุดข้อต่อทรงเสน่ห์สีนีออนขาวเรืองแสง
        const joints = [
            { x: centerX - 25, y: torsoY1 + 10, c: leftSideColor },
            { x: centerX + 25, y: torsoY1 + 10, c: rightSideColor },
            { x: leftElbowX, y: leftElbowY, c: leftSideColor },
            { x: rightElbowX, y: rightElbowY, c: rightSideColor },
            { x: leftWristX, y: leftWristY, c: leftSideColor },
            { x: rightWristX, y: rightWristY, c: rightSideColor },
            { x: leftHipX, y: torsoY2, c: leftSideColor },
            { x: rightHipX, y: torsoY2, c: rightSideColor },
            { x: leftKneeX, y: leftKneeY, c: leftSideColor },
            { x: rightKneeX, y: rightKneeY, c: rightSideColor },
            { x: leftAnkleX, y: leftAnkleY, c: leftSideColor },
            { x: rightAnkleX, y: rightAnkleY, c: rightSideColor }
        ];
        joints.forEach(j => {
            wbCanvasCtx.beginPath();
            wbCanvasCtx.arc(j.x, j.y, 6, 0, 2 * Math.PI);
            wbCanvasCtx.fillStyle = '#ffffff';
            wbCanvasCtx.shadowColor = j.c;
            wbCanvasCtx.shadowBlur = 10;
            wbCanvasCtx.fill();
        });
        
        // 5) วาด Bounding Box ไกด์ไลน์สีเขียวสลักฉลุความพรีเมียม
        wbCanvasCtx.lineWidth = 6;
        wbCanvasCtx.shadowBlur = 15;
        wbCanvasCtx.shadowColor = '#10b981';
        wbCanvasCtx.strokeStyle = '#10b981';
        wbCanvasCtx.strokeRect(
            0.15 * width, 
            0.04 * height, 
            (0.85 - 0.15) * width, 
            (0.96 - 0.04) * height
        );
        
        // โลโก้ป้าย SIMULATOR ที่หัวมุมกรอบ
        wbCanvasCtx.font = "black 10px Prompt, sans-serif";
        wbCanvasCtx.fillStyle = "#10b981";
        wbCanvasCtx.shadowBlur = 4;
        wbCanvasCtx.shadowColor = "#000000";
        wbCanvasCtx.textAlign = "left";
        wbCanvasCtx.fillText("🟢 SIMULATOR ACTIVE", 0.15 * width + 10, 0.04 * height + 20);
        
        // 6) แสดงข้อความแนะวิธีการควบคุมกึ่งกลาง Canvas
        if (wbGameState === 'BATTLE') {
            wbCanvasCtx.font = "bold 13px Prompt, sans-serif";
            wbCanvasCtx.fillStyle = "rgba(255, 255, 255, 0.4)";
            wbCanvasCtx.textAlign = "center";
            wbCanvasCtx.shadowBlur = 0;
            wbCanvasCtx.fillText("กดปุ่ม [ Spacebar ] บนคีย์บอร์ด หรือสัมผัสปุ่มด้านล่างเพื่อขยับหุ่นจำลอง", width / 2, height - 16);
        }
        
        // 7) เรนเดอร์ตัวนับถอยหลังขนาดใหญ่ 3-2-1 บน Canvas
        if (wbGameState === 'COUNTDOWN') {
            wbCanvasCtx.font = "black 140px Mali, Prompt, sans-serif";
            wbCanvasCtx.fillStyle = "#fbbf24";
            wbCanvasCtx.strokeStyle = "#78350f";
            wbCanvasCtx.lineWidth = 12;
            wbCanvasCtx.textAlign = "center";
            wbCanvasCtx.textBaseline = "middle";
            wbCanvasCtx.shadowBlur = 20;
            wbCanvasCtx.shadowColor = "#fbbf24";
            wbCanvasCtx.strokeText(wbCountdownValue + 1, width / 2, height / 2);
            wbCanvasCtx.fillText(wbCountdownValue + 1, width / 2, height / 2);
        }
        
        // 8) เรนเดอร์พาร์ติเคิลดาเมจลอยขึ้นฟ้า (Damage Floating Slash Text)
        wbActiveSlashEffects.forEach((eff, idx) => {
            wbCanvasCtx.font = `black ${eff.size}px Mali, Prompt, sans-serif`;
            wbCanvasCtx.fillStyle = `rgba(239, 68, 68, ${eff.alpha})`;
            wbCanvasCtx.shadowBlur = 10;
            wbCanvasCtx.shadowColor = '#ef4444';
            wbCanvasCtx.textAlign = 'center';
            wbCanvasCtx.fillText(`💥 -${eff.damage} HP`, eff.x, eff.y);
            
            // อัปเดตตำแหน่งลอยขึ้นและจางหาย
            eff.y -= 2;
            eff.alpha -= 0.045;
            if (eff.alpha <= 0) {
                wbActiveSlashEffects.splice(idx, 1);
            }
        });
        
        wbCanvasCtx.restore();
        
        // ขอเฟรมถัดไปของลูปจำลอง
        wbSimulatorAnimId = requestAnimationFrame(drawSimulatorFrame);
    }
</script>
