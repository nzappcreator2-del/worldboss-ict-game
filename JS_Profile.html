<script>
    /**
     * ==========================================
     * ระบบ Profile & Stats Dashboard (v4.1.2-Patch)
     * ==========================================
     */
    const PROFILE_VERSION = "v4.1.2-Patch";
    let profileLoadingTimeout = null;

    function openProfile() {
        console.log('TRACE: [openProfile] clicked');
        showDashboardTab('profile');
        fetchProfileData();
    }

    function fetchProfileData() {
        console.log('TRACE: [fetchProfileData] starting...');

        if (!currentUser || !currentUser.id) {
            console.error('TRACE Error: No currentUser or id found');
            customAlert('ไม่พบข้อมูลผู้ใช้งาน กรุณาลองเข้าสู่ระบบใหม่อีกครั้ง');
            showDashboardTab('home');
            return;
        }

        console.log('TRACE: [fetchProfileData] for user id:', currentUser.id);

        // Reset display to loading state
        const container = document.getElementById('dash-tab-profile');
        if (container) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-64">
                    <div class="inline-block w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                    <span class="ml-3 text-indigo-600 font-bold mt-2">กำลังเปิดหน้าต่างข้อมูลผู้กล้า...</span>
                    <span class="text-[10px] text-gray-300 mt-4 italic">${PROFILE_VERSION}</span>
                </div>
            `;
        }

        // Set Timeout Fallback (15 Seconds)
        if (profileLoadingTimeout) clearTimeout(profileLoadingTimeout);
        profileLoadingTimeout = setTimeout(() => {
            console.warn('TRACE: [fetchProfileData] Timeout reached');
            const c = document.getElementById('dash-tab-profile');
            if (c && c.innerText.includes('กำลังเปิดหน้าต่าง')) {
                c.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-center">
                        <div class="text-4xl mb-2">⏳</div>
                        <div class="text-gray-600 font-bold">การเชื่อมต่อล่าช้าเกินไป</div>
                        <p class="text-xs text-gray-400 mt-1">กรุณากด Profile ใหม่อีกครั้ง หรือเช็คอินเทอร์เน็ตครับ</p>
                        <button onclick="fetchProfileData()" class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg">ลองใหม่อีกครั้ง</button>
                    </div>
                `;
            }
        }, 15000);

        console.log('TRACE: [fetchProfileData] calling google.script.run.getStudentProfileData...');

        google.script.run
            .withSuccessHandler(function (res) {
                console.log('TRACE: [fetchProfileData] success handler received:', res);
                if (profileLoadingTimeout) clearTimeout(profileLoadingTimeout);

                // CRITICAL FIX: Handle null response from server
                if (res === null) {
                    console.error('TRACE API Error: Received NULL from server');
                    customAlert('เกิดข้อผิดพลาด: เซิร์ฟเวอร์ส่งข้อมูลกลับมาไม่สมบูรณ์ (Null)', 'error');
                    return;
                }

                if (res.success) {
                    renderProfile(res.profile);
                } else {
                    console.error('TRACE API Error:', res.error);
                    customAlert('ไม่สามารถโหลดข้อมูลโปรไฟล์ได้: ' + res.error, 'error');
                }
            })
            .withFailureHandler(function (err) {
                console.error('TRACE Script Run Error:', err);
                if (profileLoadingTimeout) clearTimeout(profileLoadingTimeout);
                customAlert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์: ' + err.toString(), 'error');
                showDashboardTab('home');
            })
            .getStudentProfileData(currentUser.id);
    }

    function renderProfile(data) {
        console.log('TRACE: [renderProfile] rendering data for:', data.name);
        const container = document.getElementById('dash-tab-profile');
        if (!container) return;

        const stats = data.stats || { totalScore: 0, completedLessons: 0, totalLessons: 0, completionRate: 0 };

        // -----------------------------------------
        // ระบบคลังเหรียญตรา (Badge Collection)
        // -----------------------------------------
        const BADGE_DEFS = {
            'badge_perfect': { icon: '🌟', title: 'ปัญญาชน', desc: 'ทำคะแนนทดสอบได้เต็ม' },
            'badge_streak_7': { icon: '🔥', title: 'ผู้ไม่ย่อท้อ', desc: 'เข้าเรียนต่อเนื่อง 7 วัน' },
            'badge_lvl_5': { icon: '🛡️', title: 'นักสำรวจ', desc: 'อัปเลเวลถึงระดับ 5' },
            'badge_lvl_10': { icon: '⚔️', title: 'นักรบชั้นยอด', desc: 'อัปเลเวลถึงระดับ 10' },
            'badge_lvl_20': { icon: '👑', title: 'ปรมาจารย์', desc: 'อัปเลเวลถึงระดับ 20' },
            'badge_cert': { icon: '🎓', title: 'บัณฑิตน้อย', desc: 'สอบผ่านด่านทั้งหมดสำเร็จ' }
        };

        const userBadges = (data.inventory && data.inventory.badges) ? data.inventory.badges : [];
        let badgesHtml = '';

        if (userBadges.length === 0) {
            badgesHtml = `
                <div class="col-span-full text-center p-8 bg-gray-50 border-2 border-dashed border-gray-200 rounded-[2rem] text-gray-400 font-bold flex flex-col items-center justify-center">
                    <div class="text-5xl mb-3 opacity-30 grayscale saturate-0">🏆</div>
                    ยังไม่มีเหรียญตรา<br><span class="text-xs font-normal mt-1 opacity-70">ผจญภัยและทำภารกิจต่างๆ เพื่อสะสมให้เต็มคลังนะ!</span>
                </div>
            `;
        } else {
            // จัดกลุ่ม Badge เพื่อไม่ให้แสดงซ้ำกันเต็มไปหมด ตามที่ลูกค้ารีเควสต์
            const groupedBadges = {};

            userBadges.forEach(bId => {
                if (bId.startsWith('badge_lesson_')) {
                    if (!groupedBadges['badge_lesson']) {
                        groupedBadges['badge_lesson'] = { type: 'lesson', count: 0, ids: [] };
                    }
                    groupedBadges['badge_lesson'].count++;
                    groupedBadges['badge_lesson'].ids.push(bId.replace('badge_lesson_', ''));
                } else {
                    if (!groupedBadges[bId]) {
                        groupedBadges[bId] = { type: 'normal', count: 0 };
                    }
                    groupedBadges[bId].count++;
                }
            });

            let badgeCards = Object.keys(groupedBadges).map(groupKey => {
                const groupData = groupedBadges[groupKey];
                let badgeInfo = null;

                if (groupKey === 'badge_lesson') {
                    // รวมเหรียญ Lesson เข้าเป็นเหรียญอันเดียว
                    badgeInfo = {
                        icon: '🏅',
                        title: 'ผู้พิชิต',
                        desc: 'ผ่านการทดสอบ ' + groupData.count + ' ด่าน'
                    };
                } else {
                    badgeInfo = BADGE_DEFS[groupKey];
                    if (!badgeInfo) badgeInfo = { icon: '✨', title: 'เหรียญปริศนา', desc: 'ความสำเร็จพิเศษ' };
                }

                // แถบจำนวน (แสดงเฉพาะเมื่อ count > 1 หรือเป็นประเภทแบดจ์สะสม)
                const countBadgeHtml = groupData.count > 1
                    ? `<div class="absolute top-2 right-2 bg-amber-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-md shadow-sm border border-amber-400 z-10">x${groupData.count}</div>`
                    : '';

                return `
                    <div class="bg-gradient-to-b from-white to-amber-50/50 p-4 rounded-[1.5rem] border border-amber-200 shadow-[0_4px_10px_rgba(245,158,11,0.05)] flex flex-col items-center justify-center text-center hover:-translate-y-1 hover:shadow-[0_8px_20px_rgba(245,158,11,0.15)] transition-all duration-300 group overflow-hidden relative cursor-default">
                        ${countBadgeHtml}
                        <div class="absolute inset-0 bg-white/40 blur group-hover:bg-amber-100/50 transition-colors pointer-events-none"></div>
                        <div class="relative w-16 h-16 bg-gradient-to-br from-amber-100 to-amber-300 rounded-full flex items-center justify-center text-3xl shadow-inner group-hover:rotate-[15deg] transition-transform duration-500 group-hover:scale-110 mb-3 border-2 border-white ring-4 ring-amber-50">
                            ${badgeInfo.icon}
                        </div>
                        <div class="relative font-black text-amber-900 text-sm whitespace-nowrap z-10 w-full truncate px-1 transition-opacity duration-300 group-hover:opacity-0">${badgeInfo.title}</div>
                        
                        <!-- Tooltip Hover inside card -->
                        <div class="absolute inset-x-0 bottom-0 z-20 bg-amber-900 backdrop-blur-md text-amber-50 text-xs p-2 leading-relaxed opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col items-center justify-center min-h-[50%] rounded-b-[1.5rem] shadow-lg border-t border-amber-700/50">
                            <span class="font-bold text-amber-300 mb-1 text-[10px] uppercase tracking-wider">${badgeInfo.title}</span>
                            <span class="text-center line-clamp-2">${badgeInfo.desc}</span>
                        </div>
                    </div>
                `;
            }).join('');

            badgesHtml = `
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                    ${badgeCards}
                </div>
            `;
        }

        // --- วิเคราะห์ Top Badges เพื่อโชว์ใน Showcase ---
        let topBadgeShowcaseHtml = '';
        let hasCert = userBadges.includes('badge_cert');
        const showBadges = userBadges.filter(b => !b.startsWith('badge_lesson_')).slice(0, 3);

        if (showBadges.length > 0) {
            const badgeItems = showBadges.map(bId => {
                const bInfo = BADGE_DEFS[bId];
                if (!bInfo) return '';
                return `
                    <div class="flex items-center gap-1.5 bg-white/60 backdrop-blur-sm px-2.5 py-1 rounded-full border border-amber-200/50 shadow-sm cursor-help hover:bg-white hover:scale-105 transition-transform" title="${bInfo.desc}">
                        <span class="text-sm shadow-sm">${bInfo.icon}</span>
                        <span class="text-[10px] font-bold text-amber-900">${bInfo.title}</span>
                    </div>
                `;
            }).join('');

            topBadgeShowcaseHtml = `
                <div class="mt-3 flex flex-wrap justify-center md:justify-start gap-2 items-center">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mr-1">เกียรติยศสูงสุด:</span>
                    ${badgeItems}
                </div>
            `;
        }

        // --- ส่วนการตกแต่งกรอบ VIP พิเศษ ---
        const vipGlowBorder = hasCert
            ? 'border-yellow-300 ring-8 ring-yellow-400/50 shadow-[0_0_40px_rgba(250,204,21,0.6)] animate-pulse bg-gradient-to-br from-yellow-50 to-white'
            : 'border-white shadow-[0_15px_35px_rgba(0,0,0,0.15)] bg-white';

        container.innerHTML = `
            <!-- Version Tag -->
            <div class="absolute top-2 right-4 text-[9px] text-gray-300 pointer-events-none">${PROFILE_VERSION}</div>

            <!-- Header Section: Avatar & Level -->
            <div class="flex flex-col md:flex-row gap-6 mb-8 items-center md:items-end animate-slide-up">
                <div class="relative group">
                    <div class="absolute inset-0 ${hasCert ? 'bg-yellow-400 opacity-40' : 'bg-indigo-500 opacity-25'} rounded-full blur-2xl group-hover:opacity-60 transition-opacity duration-500"></div>
                    <div class="relative w-32 h-32 md:w-40 md:h-40 rounded-full border-[5px] ${vipGlowBorder} flex items-center justify-center text-7xl md:text-8xl p-4 overflow-hidden transition-all duration-500 hover:scale-105 hover:rotate-3">
                        ${data.avatar || '👤'}
                    </div>
                    <div class="absolute -bottom-2 -right-2 ${hasCert ? 'bg-yellow-500 text-amber-900 border-yellow-200 shadow-yellow-500/50' : 'bg-indigo-600 text-white border-white'} w-10 h-10 md:w-12 md:h-12 rounded-full border-4 flex items-center justify-center font-black text-lg shadow-lg">
                        ${data.level || 1}
                    </div>
                </div>

                <div class="flex-1 text-center md:text-left space-y-2">
                    <h2 class="text-3xl md:text-5xl font-black text-gray-800 drop-shadow-sm uppercase tracking-tight flex flex-wrap justify-center md:justify-start items-center gap-2">
                        ${data.name || 'Unknown Warrior'}
                        ${hasCert ? '<span class="text-xl md:text-2xl animate-bounce" title="บัณฑิตน้อย">🎓</span>' : ''}
                    </h2>
                    <p class="text-lg md:text-xl font-bold text-indigo-500 flex flex-wrap items-center justify-center md:justify-start gap-2 mt-1">
                        <span class="bg-indigo-50 px-3 py-1 rounded-full text-sm border border-indigo-100 shadow-sm">🛡️ ชั้นเรียน ${data.class || '-'}</span>
                        <span class="text-gray-300">|</span>
                        <span class="bg-gradient-to-r from-indigo-600 to-indigo-500 px-3 py-1 rounded-full text-sm text-white shadow-md border ${hasCert ? 'border-yellow-400 ring-2 ring-yellow-400/50' : 'border-indigo-700'}">⚔️ ${data.rank || 'BRONZE'}</span>
                    </p>
                    
                    ${topBadgeShowcaseHtml}
                    
                    <div class="w-full max-w-md mx-auto md:mx-0 space-y-1 mt-4">
                        <div class="flex justify-between text-xs font-bold text-indigo-600 px-1">
                            <span>ความก้าวหน้า XP</span>
                            <span>${(data.xp || 0).toLocaleString()} XP</span>
                        </div>
                        <div class="h-5 bg-white/80 rounded-full overflow-hidden border-2 border-indigo-100 p-0.5 shadow-sm">
                            <div class="h-full bg-gradient-to-r from-indigo-400 via-indigo-500 to-indigo-600 rounded-full transition-all duration-1000 shadow-inner" style="width: ${Math.min(100, ((data.xp || 0) % 1000) / 10)}%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bento Grid Stats Section -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5 animate-slide-up" style="animation-delay: 100ms">
                <!-- Stat: Total Score -->
                <div class="bg-white/95 backdrop-blur-xl p-4 md:p-6 rounded-[2rem] border-2 border-amber-200 shadow-[0_10px_20px_rgba(245,158,11,0.05)] flex flex-col items-center justify-center text-center group hover:border-amber-400 transition-all hover:-translate-y-2 hover:shadow-xl">
                    <div class="text-3xl md:text-4xl mb-2 group-hover:scale-110 transition-transform">🔥</div>
                    <div class="text-2xl md:text-3xl font-black text-amber-600">${(stats.totalScore || 0).toLocaleString()}</div>
                    <div class="text-[10px] md:text-xs font-bold text-amber-400 uppercase tracking-widest mt-1">คะแนนรวม</div>
                </div>

                <!-- Stat: Lessons Passed -->
                <div class="bg-white/95 backdrop-blur-xl p-4 md:p-6 rounded-[2rem] border-2 border-green-200 shadow-[0_10px_20px_rgba(16,185,129,0.05)] flex flex-col items-center justify-center text-center group hover:border-green-400 transition-all hover:-translate-y-2 hover:shadow-xl">
                    <div class="text-3xl md:text-4xl mb-2 group-hover:scale-110 transition-transform">⛳</div>
                    <div class="text-2xl md:text-3xl font-black text-green-600">${stats.completedLessons}/${stats.totalLessons}</div>
                    <div class="text-[10px] md:text-xs font-bold text-green-400 uppercase tracking-widest mt-1">ด่านที่พิชิต</div>
                </div>

                <!-- Stat: Streak -->
                <div class="bg-white/95 backdrop-blur-xl p-4 md:p-6 rounded-[2rem] border-2 border-rose-200 shadow-[0_10px_20px_rgba(244,63,94,0.05)] flex flex-col items-center justify-center text-center group hover:border-rose-400 transition-all hover:-translate-y-2 hover:shadow-xl">
                    <div class="text-3xl md:text-4xl mb-2 group-hover:scale-110 transition-transform">❤️</div>
                    <div class="text-2xl md:text-3xl font-black text-rose-600">${data.streak || 0} วัน</div>
                    <div class="text-[10px] md:text-xs font-bold text-rose-400 uppercase tracking-widest mt-1">พลังต่อเนื่อง</div>
                </div>

                <!-- Stat: Coins -->
                <div class="bg-white/95 backdrop-blur-xl p-4 md:p-6 rounded-[2rem] border-2 border-yellow-200 shadow-[0_10px_20px_rgba(234,179,8,0.05)] flex flex-col items-center justify-center text-center group hover:border-yellow-400 transition-all hover:-translate-y-2 hover:shadow-xl">
                    <div class="text-3xl md:text-4xl mb-2 group-hover:scale-110 transition-transform">💰</div>
                    <div class="text-2xl md:text-3xl font-black text-yellow-600">${(data.coins || 0).toLocaleString()}</div>
                    <div class="text-[10px] md:text-xs font-bold text-yellow-400 uppercase tracking-widest mt-1">เหรียญทอง</div>
                </div>
            </div>

            <!-- Detailed Analysis Section -->
            <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-5 animate-slide-up" style="animation-delay: 200ms">
                <!-- Completion Ring -->
                <div class="md:col-span-1 bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-[2.5rem] p-8 text-white shadow-2xl flex flex-col items-center justify-center relative overflow-hidden group">
                    <div class="absolute -right-10 -bottom-10 text-white/5 text-[12rem] font-black pointer-events-none tracking-tighter shrink-0 group-hover:scale-110 transition-transform duration-1000">
                        ${stats.completionRate}%
                    </div>
                    <h4 class="text-xs font-bold opacity-80 mb-6 uppercase tracking-[0.2em] text-center">ความสำเร็จในภารกิจ</h4>
                    <div class="relative w-40 h-40 flex items-center justify-center mb-6">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.15)" stroke-width="14" fill="transparent" />
                            <circle cx="80" cy="80" r="70" stroke="white" stroke-width="14" fill="transparent" 
                                stroke-dasharray="439.82" 
                                stroke-dashoffset="${439.82 * (1 - Math.min(100, (stats.completionRate || 0)) / 100)}" 
                                stroke-linecap="round"
                                class="transition-all duration-1000 ease-out" />
                        </svg>
                        <span class="absolute text-4xl font-black">${Math.min(100, stats.completionRate || 0)}%</span>
                    </div>
                    <p class="text-[10px] text-center opacity-70 leading-relaxed max-w-[15ch]">คุณกำลังเข้าใกล้การเป็นปรมาจารย์ NextGen Play เข้าไปทุกที!</p>
                </div>

                <div class="md:col-span-2 bg-white/95 backdrop-blur-xl rounded-[2.5rem] p-8 border-2 border-indigo-100 shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-full -translate-y-16 translate-x-16 opacity-50"></div>
                    
                    <h4 class="text-indigo-950 font-black mb-6 flex items-center gap-3 text-lg">
                        <span class="w-10 h-10 bg-indigo-100 rounded-2xl flex items-center justify-center text-xl shadow-sm">🎒</span> 
                        ไอเทมปัจจุบัน
                    </h4>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100 flex items-center gap-4 transition-all hover:bg-white hover:shadow-md group">
                            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:scale-110 transition-transform">🧪</div>
                            <div>
                                <div class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider">Health Potion</div>
                                <div class="text-xl font-black text-indigo-950">${(data.inventory && data.inventory.potion) || 0} <span class="text-sm font-bold text-gray-500">ขวด</span></div>
                            </div>
                        </div>
                        <div class="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100 flex items-center gap-4 transition-all hover:bg-white hover:shadow-md group">
                            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:scale-110 transition-transform">🔍</div>
                            <div>
                                <div class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider">Magnifier Tool</div>
                                <div class="text-xl font-black text-indigo-950">${(data.inventory && data.inventory.magnifier) || 0} <span class="text-sm font-bold text-gray-500">ชิ้น</span></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 pt-8 border-t border-indigo-50">
                         <h4 class="text-indigo-950 font-black mb-4 flex items-center gap-3">
                            <span class="w-8 h-8 bg-indigo-50 rounded-xl flex items-center justify-center text-sm shadow-sm">🏅</span> 
                            สรุปสถานะการเรียน
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                            <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-indigo-50 shadow-sm">
                                <span class="text-indigo-600 font-bold">เข้าใช้งานล่าสุด</span>
                                <span class="text-indigo-950 font-black bg-indigo-50 px-3 py-1 rounded-lg text-xs">${formatDate(data.lastlogin)}</span>
                            </div>
                            <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-indigo-50 shadow-sm">
                                <span class="text-indigo-600 font-bold">ระดับการเข้าถึง</span>
                                <span class="text-green-600 font-black bg-green-50 px-3 py-1 rounded-lg text-xs uppercase tracking-wider">Full Access</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Badge Collection Section -->
                <div class="md:col-span-3 bg-white/95 backdrop-blur-xl rounded-[2.5rem] p-8 border-2 border-amber-100 shadow-xl relative overflow-hidden mt-1 group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-amber-50 rounded-full -translate-y-16 translate-x-16 opacity-50 pointer-events-none transition-transform duration-700 group-hover:scale-150 group-hover:rotate-45"></div>
                    <div class="absolute bottom-0 left-0 w-40 h-40 bg-amber-50 rounded-full translate-y-20 -translate-x-10 opacity-30 pointer-events-none transition-transform duration-700 group-hover:scale-125"></div>
                    <h4 class="text-amber-950 font-black mb-6 flex items-center gap-3 text-xl relative z-10">
                        <span class="w-12 h-12 bg-gradient-to-br from-amber-100 to-amber-200 rounded-2xl flex items-center justify-center text-3xl shadow-sm animate-pulse-slow">🏆</span> 
                        คลังเหรียญตราความสำเร็จ
                    </h4>
                    <div class="relative z-10">
                        ${badgesHtml}
                    </div>
                </div>
            </div>
            <div class="h-12"></div>
        `;
        console.log('TRACE: [renderProfile] finished');
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'ไม่ระบุ';
        try {
            const date = new Date(dateStr);
            return date.toLocaleDateString('th-TH', {
                day: '2-digit',
                month: 'short',
                year: '2-digit'
            });
        } catch (e) {
            return dateStr;
        }
    }
</script>
