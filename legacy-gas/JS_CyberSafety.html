<script>
    // ==========================================
    // Cyber Safety Mode - Logic & UI Controller
    // ==========================================

    let cyberScenarios = [];
    let currentScenarioIdx = 0;
    let cyberSafetyHp = 100;
    let earnedCoins = 0;
    let earnedXp = 0;
    let currentScenarioAttempts = 0; // นับครั้งที่พยายามในด่านปัจจุบันสำหรับคำนวณคะแนนไดนามิก

    // ตัวแปรเพิ่มเข้ามาสำหรับระบบ Visual Novel
    let lastSelectedIdx = -1;
    let gameState = 'story'; // 'story' | 'feedback'
    let isTyping = false;
    let currentTypingTimer = null;

    /**
     * สลับหน้าเข้าเล่นโหมด Cyber Safety (เปิดหน้าปกเริ่มต้นก่อน)
     */
    function enterCyberSafetyMode() {
        if (typeof playClickSound === 'function') playClickSound();

        if (!currentUser || !currentUser.name) {
            customAlert("กรุณาเลือกรายชื่อผู้กล้าและเข้าสู่ระบบก่อนเข้าเล่นโหมดภัยไซเบอร์ครับ");
            showPage('landing');
            return;
        }

        // แสดงหน้าจอของโหมด Cyber Safety
        showPage('cyber-safety');

        // รีเซ็ตเกมสเตต
        cyberSafetyHp = 100;
        currentScenarioIdx = 0;
        earnedCoins = 0;
        earnedXp = 0;
        currentScenarioAttempts = 0;

        // สั่งเคลียร์ Background layer กลับสู่ค่าตั้งต้น
        resetCyberBackground();

        // แสดงหน้าปกเริ่มต้น (Start Screen) และซ่อนองค์ประกอบเกมอื่นชั่วคราว
        const startScreen = document.getElementById('cyber-start-screen');
        if (startScreen) startScreen.classList.remove('hidden');

        const titleHeader = document.getElementById('cyber-title-header');
        if (titleHeader) titleHeader.classList.remove('hidden');

        const container = document.getElementById('cyber-game-container');
        if (container) container.classList.add('hidden');

        const victory = document.getElementById('cyber-victory-screen');
        if (victory) victory.classList.add('hidden');

        const loader = document.getElementById('cyber-loader');
        if (loader) loader.classList.add('hidden');

        const playArea = document.getElementById('cyber-game-play-area');
        if (playArea) playArea.classList.add('hidden');

        const hudContainer = document.getElementById('cyber-hud-container');
        if (hudContainer) hudContainer.classList.add('hidden');
    }

    /**
     * ฟังก์ชันเริ่มต้นรันเกมและโหลดคำถามอย่างเป็นทางการ (เมื่อคลิกปุ่มเริ่มเกมจากหน้าปก)
     */
    function startCyberSafetyGame() {
        if (typeof playClickSound === 'function') playClickSound();

        // ซ่อนหน้าปกเริ่มต้น
        const startScreen = document.getElementById('cyber-start-screen');
        if (startScreen) startScreen.classList.add('hidden');

        // ซ่อนหัวข้อหลักดั้งเดิมตรงกลางไม่ให้บดบัง Visual Novel (เพราะย้ายไปอยู่ป้ายชื่อซ้ายบนแล้ว)
        const titleHeader = document.getElementById('cyber-title-header');
        if (titleHeader) titleHeader.classList.add('hidden');

        const container = document.getElementById('cyber-game-container');
        if (container) container.classList.remove('hidden');

        // เปิดหน้าจอร่ายเวทย์โหลดข้อมูล
        const loader = document.getElementById('cyber-loader');
        if (loader) loader.classList.remove('hidden');

        const playArea = document.getElementById('cyber-game-play-area');
        if (playArea) playArea.classList.add('hidden');

        const hudContainer = document.getElementById('cyber-hud-container');
        if (hudContainer) hudContainer.classList.add('hidden');

        // ดึงโจทย์ภัยไซเบอร์
        if (typeof google !== 'undefined') {
            google.script.run
                .withSuccessHandler(onLoadScenariosSuccess)
                .withFailureHandler(onLoadScenariosFailure)
                .getCyberSafetyScenarios();
        } else {
            // โหมด Mock โลคอลสำหรับพรีวิว
            setTimeout(() => {
                onLoadScenariosSuccess({
                    success: true,
                    data: getMockCyberScenarios()
                });
            }, 1200);
        }
    }

    /**
     * ฟังก์ชันปรับภาพพื้นหลังโหมด Cyber Safety ให้กางเต็มจอสมจริงแบบ Visual Novel
     */
    function updateCyberBackground(scenario) {
        const cyberBg = document.getElementById('cyber-bg-layer');
        if (!cyberBg) return;

        const imgUrl = String(scenario.imageSvg || '').trim();
        if (imgUrl.startsWith('http://') || imgUrl.startsWith('https://')) {
            cyberBg.style.backgroundImage = `linear-gradient(rgba(15, 23, 42, 0.2), rgba(15, 23, 42, 0.3)), url('${imgUrl}')`;
        } else {
            // โหลด SVG ดั้งเดิมมาเข้ารหัสและใช้เป็นภาพพื้นหลังจำลอง
            const svgContent = getScenarioSvg(scenario.id);
            const dataUrl = `url("data:image/svg+xml;utf8,${encodeURIComponent(svgContent)}")`;
            cyberBg.style.backgroundImage = `linear-gradient(rgba(15, 23, 42, 0.2), rgba(15, 23, 42, 0.3)), ${dataUrl}`;
        }
        cyberBg.style.backgroundSize = 'cover';
        cyberBg.style.backgroundPosition = 'center';
        cyberBg.style.transition = 'background-image 0.8s ease-in-out';
    }

    /**
     * รีเซ็ตภาพพื้นหลังกลับสู่ค่าตั้งต้น
     */
    function resetCyberBackground() {
        const cyberBg = document.getElementById('cyber-bg-layer');
        if (cyberBg) {
            cyberBg.style.backgroundImage = "linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), url('https://i.postimg.cc/XJvHvNjX/re-0.png')";
            cyberBg.style.backgroundSize = 'cover';
            cyberBg.style.backgroundPosition = 'center';
        }
    }

    /**
     * ฟังก์ชันแอนิเมชันพิมพ์บทบรรยายแบบ Typewriter (สไตล์ Visual Novel)
     */
    function typeWriterEffect(element, text, speed = 20, onComplete = null) {
        if (currentTypingTimer) clearInterval(currentTypingTimer);
        element.textContent = '';
        isTyping = true;

        const nextBtn = document.getElementById('cyber-dialog-next-btn');
        const btnText = document.getElementById('cyber-dialog-btn-text');
        if (nextBtn) nextBtn.classList.remove('hidden');
        if (btnText) {
            btnText.textContent = (gameState === 'feedback') ? "ข้ามการอธิบาย ⏭️" : "ข้ามเรื่องเล่า ⏭️";
        }

        let i = 0;
        currentTypingTimer = setInterval(() => {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
            } else {
                clearInterval(currentTypingTimer);
                currentTypingTimer = null;
                isTyping = false;

                if (btnText) {
                    if (gameState === 'story') {
                        btnText.textContent = "ร่วมตัดสินใจ ⚡";
                    } else if (gameState === 'feedback') {
                        const scenario = cyberScenarios[currentScenarioIdx];
                        if (scenario) {
                            const isCorrect = (lastSelectedIdx === scenario.answerIdx);
                            btnText.textContent = isCorrect ? (currentScenarioIdx === cyberScenarios.length - 1 ? "สรุปผล 🏁" : "เดินทางต่อไป 🚶") : "เลือกใหม่ 🔄";
                        }
                    }
                }
                if (onComplete) onComplete();
            }
        }, speed);
    }

    /**
     * ฟังก์ชันกดข้ามบทสนทนา (Skip) หรือรันคำสั่งดำเนินการต่อ
     */
    function skipOrContinueDialogue() {
        const scenario = cyberScenarios[currentScenarioIdx];
        if (!scenario) return;

        const textEl = document.getElementById('cyber-dialog-text');
        const btnText = document.getElementById('cyber-dialog-btn-text');

        if (isTyping) {
            // กรณีที่ 1: กำลังรันพ่นบทบรรยาย -> กดข้าม (Skip) ให้ตัวหนังสือออกครบในทันที
            if (currentTypingTimer) {
                clearInterval(currentTypingTimer);
                currentTypingTimer = null;
            }
            isTyping = false;

            if (gameState === 'story') {
                if (textEl) textEl.textContent = scenario.text;
                if (btnText) btnText.textContent = "ร่วมตัดสินใจ ⚡";
                // เปิดกล่องชอยส์ตัดสินใจหลังหน่วงเวลาเล็กน้อยเพื่อความไหลลื่น
                setTimeout(showCyberChoices, 300);
            } else if (gameState === 'feedback') {
                const isCorrect = (lastSelectedIdx === scenario.answerIdx);
                if (textEl) textEl.textContent = isCorrect ? scenario.feedbackRight : scenario.feedbackWrong;
                if (btnText) btnText.textContent = isCorrect ? (currentScenarioIdx === cyberScenarios.length - 1 ? "สรุปผล 🏁" : "เดินทางต่อไป 🚶") : "เลือกใหม่ 🔄";
            }
        } else {
            // กรณีที่ 2: บทบรรยายพ่นเสร็จสิ้นแล้ว -> ย้ายไปขั้นตอนถัดไปตามโหมดรัฐ
            if (gameState === 'story') {
                showCyberChoices();
            } else if (gameState === 'feedback') {
                const isCorrect = (lastSelectedIdx === scenario.answerIdx);
                if (isCorrect) {
                    currentScenarioIdx++;
                    renderCyberScenario();
                } else {
                    // ปรับเกมสเตตกลับมาเล่าเรื่อง เพื่อยอมให้เลือกตัดสินใจใหม่
                    gameState = 'story';
                    resetDialogStyle();
                    renderCyberScenario();
                }
            }
        }
    }

    /**
     * เรียกแสดงตัวเลือกการตัดสินใจลอยขึ้นมาตรงกลางหน้าจอ (แนวยาวแคบสุดหรูแบบ ref1)
     */
    function showCyberChoices() {
        const scenario = cyberScenarios[currentScenarioIdx];
        if (!scenario) return;

        const optContainer = document.getElementById('cyber-options-container');
        if (optContainer) {
            optContainer.innerHTML = '';
            const opts = [scenario.opt1, scenario.opt2];
            opts.forEach((optText, idx) => {
                if (!optText) return;
                const btn = document.createElement('button');

                // ดีไซน์ปุ่มแนวยาวเรียวแบนและยืดหยุ่นหดตัวได้จริง ไม่จำกัดความกว้างสูงสุดแคบเกินไป ป้องกันการล้นทะลุขอบ (สไตล์ ref2 ยืดหยุ่นโอบล้อมรอบตัวอักษร และรองรับการตัดคำขึ้นบรรทัดใหม่อ่านง่ายสวยงาม)
                btn.className = `w-full max-w-[94%] sm:max-w-[85%] mx-auto text-center py-2 md:py-3 px-4 md:px-8 rounded-2xl md:rounded-3xl text-white border border-white/40 bg-black/95 hover:bg-white hover:text-black hover:border-white font-bold text-[11px] sm:text-xs md:text-sm shadow-[0_0_8px_rgba(255,255,255,0.1)] hover:shadow-[0_0_18px_rgba(255,255,255,0.3)] transform transition-all active:scale-95 duration-150 cursor-pointer inline-flex items-center justify-center gap-2 md:gap-3 whitespace-normal break-words flex-shrink-0`;
                btn.onclick = (e) => {
                    e.stopPropagation(); // กันการคลิกทะลุลงไปโดน Dialog กล่องล่าง
                    selectCyberOption(idx);
                };

                // ประดับดวงดาว ✦✦ ส่องสว่างซ้ายขวาอย่างสมดุล ข้อความอยู่ตรงกลาง (ไม่มี flex-1 เพื่อป้องกันดาวลอยนอกขอบ และจัดวางแบบ flex-shrink เพื่อความมั่นคง)
                btn.innerHTML = `
                    <span class="text-cyan-300 text-xs md:text-sm select-none animate-pulse flex-shrink-0">✦✦</span>
                    <span class="leading-relaxed tracking-wider drop-shadow-sm select-none font-extrabold px-1 md:px-2 text-center whitespace-normal break-words">${optText}</span>
                    <span class="text-cyan-300 text-xs md:text-sm select-none animate-pulse flex-shrink-0">✦✦</span>
                `;
                optContainer.appendChild(btn);
            });
        }

        // แสดงผลหน้าจอ Overlay ชอยส์ลอยตัว
        const overlay = document.getElementById('cyber-choices-overlay');
        if (overlay) overlay.classList.remove('hidden');

        // ซ่อนปุ่มกดเล่าต่อด้านล่างชั่วคราวขณะให้ตัดสินใจ
        const nextBtn = document.getElementById('cyber-dialog-next-btn');
        if (nextBtn) nextBtn.classList.add('hidden');
    }

    /**
     * คืนค่ารูปโฉมกรอบข้อความล่างสู่ความปกติเป็นกลาง
     */
    function resetDialogStyle() {
        const dialogBox = document.getElementById('cyber-dialog-box');
        if (dialogBox) {
            dialogBox.className = 'glass-card bg-slate-950/90 border-4 border-cyan-400 p-5 md:p-6 rounded-3xl shadow-[0_15px_35px_rgba(0,0,0,0.6)] flex flex-col gap-3 relative min-h-[160px] animate-fadeIn transition-all duration-300 cursor-pointer';
        }
    }

    /**
     * ฟังก์ชันรันข้อมูลภัยไซเบอร์จำลองกรณีฉุกเฉิน (Fail-safe Backup)
     */
    function loadBackupMockScenarios() {
        try {
            cyberScenarios = getMockCyberScenarios();
            const loader = document.getElementById('cyber-loader');
            if (loader) loader.classList.add('hidden');
            const playArea = document.getElementById('cyber-game-play-area');
            if (playArea) playArea.classList.remove('hidden');
            const hudContainer = document.getElementById('cyber-hud-container');
            if (hudContainer) hudContainer.classList.remove('hidden');
            renderCyberScenario();
        } catch (e) {
            console.error("Critical error in loadBackupMockScenarios:", e);
            customAlert("พบข้อผิดพลาดร้ายแรงในสคริปต์ภัยไซเบอร์จำลอง");
            exitCyberSafetyMode();
        }
    }

    /**
     * ดึงโจทย์สำเร็จ
     */
    function onLoadScenariosSuccess(res) {
        try {
            const loader = document.getElementById('cyber-loader');
            if (loader) loader.classList.add('hidden');

            if (res && res.success && res.data && res.data.length > 0) {
                cyberScenarios = res.data;
                const playArea = document.getElementById('cyber-game-play-area');
                if (playArea) playArea.classList.remove('hidden');
                const hudContainer = document.getElementById('cyber-hud-container');
                if (hudContainer) hudContainer.classList.remove('hidden');
                renderCyberScenario();
            } else {
                console.warn("getCyberSafetyScenarios success but no data or invalid response:", res);
                customAlert("ไม่พบข้อมูลสถานการณ์บน Google Sheets หรือหัวตารางไม่ถูกต้องครับ\n👉 ระบบจะสลับไปใช้ด่านจำลองความปลอดภัยไซเบอร์แทนเพื่อให้ผู้เรียนเล่นต่อได้ครับ!");
                loadBackupMockScenarios();
            }
        } catch (err) {
            console.error("Error in onLoadScenariosSuccess:", err);
            customAlert("เกิดข้อผิดพลาดในการโหลดด่าน ย้ายไปที่ระบบจำลองภัยไซเบอร์สำรองเพื่อความต่อเนื่องครับ");
            loadBackupMockScenarios();
        }
    }

    /**
     * ดึงโจทย์ล้มเหลว
     */
    function onLoadScenariosFailure(err) {
        try {
            const loader = document.getElementById('cyber-loader');
            if (loader) loader.classList.add('hidden');
            customAlert("การเชื่อมต่อฐานข้อมูล Sheets ล้มเหลว\n👉 ระบบจะสลับไปใช้ด่านจำลองความปลอดภัยไซเบอร์แทนชั่วคราวครับ");
            loadBackupMockScenarios();
        } catch (e) {
            console.error("Error in onLoadScenariosFailure:", e);
            exitCyberSafetyMode();
        }
    }

    /**
     * แสดงผลเหตุการณ์ปัจจุบัน
     */
    function renderCyberScenario() {
        try {
            if (currentScenarioIdx >= cyberScenarios.length) {
                showCyberVictoryScreen();
                return;
            }

            // ตั้งค่าสถานะเริ่มต้นเมื่อเข้าสู่บทบรรยายด่านใหม่
            gameState = 'story';
            currentScenarioAttempts = 0;
            const scenario = cyberScenarios[currentScenarioIdx];
            if (!scenario) {
                console.error("Scenario is null at index:", currentScenarioIdx);
                customAlert("ไม่พบข้อมูลสถานการณ์ด่านนี้ครับ");
                exitCyberSafetyMode();
                return;
            }

            // 1. อัปเดตพื้นหลังเต็มจอแบบ Visual Novel
            updateCyberBackground(scenario);

            // 2. อัปเดตข้อมูลช่วงเวลาและคะแนนด้านบน
            const timeEl = document.getElementById('cyber-scenario-time');
            if (timeEl) timeEl.textContent = scenario.timeOfDay || 'ทั่วไป';

            const scoreEl = document.getElementById('cyber-score-current');
            if (scoreEl) scoreEl.textContent = earnedCoins;

            // กำหนดไอคอนช่วงเวลา
            const timeIconEl = document.getElementById('cyber-time-icon');
            if (timeIconEl) {
                const timeStr = String(scenario.timeOfDay || '').trim();
                if (timeStr.includes('เช้า')) {
                    timeIconEl.textContent = '☀️';
                    timeIconEl.className = 'text-3xl animate-pulse text-yellow-500';
                } else if (timeStr.includes('กลางวัน')) {
                    timeIconEl.textContent = '⛅';
                    timeIconEl.className = 'text-3xl animate-pulse text-sky-400';
                } else if (timeStr.includes('เย็น')) {
                    timeIconEl.textContent = '🌅';
                    timeIconEl.className = 'text-3xl animate-pulse text-orange-500';
                } else {
                    timeIconEl.textContent = '🌙';
                    timeIconEl.className = 'text-3xl animate-pulse text-indigo-400';
                }
            }

            // 3. จัดการหลอดเลือด HP
            updateCyberHpUI();

            // 4. ตั้งค่าคาแรคเตอร์ผู้พูด/ป้ายหัวข้อด้านล่าง
            const speakerBadge = document.getElementById('cyber-speaker-badge');
            if (speakerBadge) speakerBadge.textContent = `📖 เหตุการณ์: ${scenario.title || 'ความเสี่ยงไซเบอร์'}`;

            // ค้นหารายละเอียดคู่หูผจญภัย
            const helperAvatar = (currentUser && currentUser.avatar) || '🧙‍♂️';
            let helperName = "คู่หูผู้กล้า";
            if (helperAvatar === '🧙‍♂️') helperName = "จอมเวทย์แนะแนว";
            else if (helperAvatar === '🧝‍♀️') helperName = "เอลฟ์ผู้รอบรู้";
            else helperName = "นักรบผู้พิทักษ์";

            const npcAvatarEl = document.getElementById('cyber-npc-avatar');
            const npcNameEl = document.getElementById('cyber-npc-name');
            if (npcAvatarEl) npcAvatarEl.textContent = helperAvatar;
            if (npcNameEl) npcNameEl.textContent = helperName;

            // 5. ปิดบังกล่องชอยส์เลือกตอบชั่วคราว
            const overlay = document.getElementById('cyber-choices-overlay');
            if (overlay) overlay.classList.add('hidden');

            // 6. คืนสภาพสีกรอบและสั่งรัน Typewriter พ่นบทบรรยายเนื้อเรื่องหลัก
            resetDialogStyle();

            const textEl = document.getElementById('cyber-dialog-text');
            if (textEl) {
                typeWriterEffect(textEl, scenario.text, 20, () => {
                    // เมื่อรันอักษรจบโดยธรรมชาติ ให้หน่วงเวลาและเปิดตัวเลือกกลางจออัตโนมัติ
                    setTimeout(() => {
                        if (gameState === 'story' && !isTyping) {
                            showCyberChoices();
                        }
                    }, 800);
                });
            }
        } catch (e) {
            console.error("Critical error in renderCyberScenario:", e);
            customAlert("พบข้อผิดพลาดขณะวาดด่านเกม: " + e.message + "\n👉 กำลังปรับไปใช้โหมดภัยไซเบอร์จำลองเสมือนสำรองแทนครับ!");
            loadBackupMockScenarios();
        }
    }

    /**
     * จัดการหลอด HP ผู้พิทักษ์
     */
    function updateCyberHpUI() {
        const hpBar = document.getElementById('cyber-hp-bar');
        const hpText = document.getElementById('cyber-hp-text');

        if (hpBar) {
            hpBar.style.width = cyberSafetyHp + '%';
            if (cyberSafetyHp >= 75) {
                hpBar.className = 'h-full bg-gradient-to-r from-cyan-400 to-blue-500 transition-all duration-500';
            } else if (cyberSafetyHp >= 50) {
                hpBar.className = 'h-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-500';
            } else {

    /**
     * เมื่อผู้เล่นเลือกตัวเลือกตัดสินใจ
     */
    function selectCyberOption(selectedIdx) {
        lastSelectedIdx = selectedIdx;
        gameState = 'feedback';

        const scenario = cyberScenarios[currentScenarioIdx];
        if (!scenario) return;

        const isCorrect = selectedIdx === scenario.answerIdx;

        // ค้นหา NPC อวาตาร์คู่หู
        const helperAvatar = (currentUser && currentUser.avatar) || '🧙‍♂️';
        let helperName = "คู่หูผู้กล้า";
        if (helperAvatar === '🧙‍♂️') helperName = "🧙‍♂️ จอมเวทย์แนะแนว";
        else if (helperAvatar === '🧝‍♀️') helperName = "🧝‍♀️ เอลฟ์ผู้รอบรู้";
        else helperName = "⚔️ นักรบผู้พิทักษ์";

        // ซ่อนชอยส์ลอยตัวกลางหน้าจอ
        const overlay = document.getElementById('cyber-choices-overlay');
        if (overlay) overlay.classList.add('hidden');

        // แสดงป้ายชื่อผู้แนะแนวทาง
        const speakerBadge = document.getElementById('cyber-speaker-badge');
        if (speakerBadge) {
            speakerBadge.textContent = isCorrect ? `🎉 ยอดเยี่ยม! (ถูกต้อง)` : `🚨 มีความเสี่ยงเกิดขึ้น!`;
        }

        const dialogBox = document.getElementById('cyber-dialog-box');
        const textEl = document.getElementById('cyber-dialog-text');
        const btnText = document.getElementById('cyber-dialog-btn-text');

        // ปรับเปลี่ยนสีของกรอบกล่องข้อความตามความถูกต้อง
        if (dialogBox) {
            if (isCorrect) {
                dialogBox.className = 'glass-card bg-slate-950/95 border-4 border-emerald-500 p-5 md:p-6 rounded-3xl shadow-[0_15px_35px_rgba(0,0,0,0.6)] flex flex-col gap-3 relative min-h-[160px] animate-fadeIn transition-all duration-300 cursor-pointer';
            } else {
                dialogBox.className = 'glass-card bg-slate-950/95 border-4 border-rose-500 p-5 md:p-6 rounded-3xl shadow-[0_15px_35px_rgba(0,0,0,0.6)] flex flex-col gap-3 relative min-h-[160px] animate-fadeIn transition-all duration-300 cursor-pointer';
            }
        }

        if (isCorrect) {
            // กรณีเลือกตอบถูกต้อง
            if (typeof playSuccessSound === 'function') playSuccessSound();

            // คำนวณคะแนนแบบ Dynamic
            let coinReward = 20;
            let xpReward = 20;
            let rewardMsg = "ยอดเยี่ยม! ตอบถูกในครั้งแรก";

            if (currentScenarioAttempts > 0) {
                coinReward = 5;
                xpReward = 5;
                rewardMsg = "ดีมาก! เรียนรู้และตอบแก้ตัวใหม่สำเร็จ";
            }

            earnedCoins += coinReward;
            earnedXp += xpReward;

            // บันทึกเหรียญในหน้าจอ
            const scoreEl = document.getElementById('cyber-score-current');
            if (scoreEl) scoreEl.textContent = earnedCoins;

            const feedbackText = `🎉 ${rewardMsg} (+${coinReward} ⭐)\n\n${scenario.feedbackRight || ''}`;

            if (textEl) {
                typeWriterEffect(textEl, feedbackText, 15, () => {
                    if (btnText) {
                        btnText.textContent = (currentScenarioIdx === cyberScenarios.length - 1) ? 'สรุปผล 🏁' : 'เดินทางต่อไป 🚶';
                    }
                });
            }

        } else {
            // เคสเลือกผิด
            if (typeof playErrorSound === 'function') playErrorSound();

            // สั่นหน้าจอป้องกันภัย
            const gameContainer = document.getElementById('cyber-game-container');
            if (gameContainer) {
                gameContainer.classList.add('animate-shake-strong');
                setTimeout(() => gameContainer.classList.remove('animate-shake-strong'), 500);
            }

            // หักค่า HP (ขั้นต่ำ 0)
            cyberSafetyHp = Math.max(0, cyberSafetyHp - 25);
            updateCyberHpUI();
            currentScenarioAttempts++; // นับครั้งพยายามกดผิด

            const feedbackText = `🚨 เกราะป้องกัน Cyber Shield เสียหาย! (Shield ลดลง)\n\n${scenario.feedbackWrong || ''}`;

            if (textEl) {
                typeWriterEffect(textEl, feedbackText, 15, () => {
                    if (btnText) {
                        btnText.textContent = 'เลือกใหม่ 🔄';
                    }
                });
            }
        }
    }

    /**
     * หน้าจอเมื่อจบเกมน้องเซฟมีชีวิตรอด
     */
    function showCyberVictoryScreen() {
        // ซ่อนหน้าต่างตัวเกมหลักและ HUD ซ้ายบนเพื่อความสวยงามพรีเมียม ไร้สิ่งบดบัง
        const playArea = document.getElementById('cyber-game-play-area');
        if (playArea) playArea.classList.add('hidden');

        const hudContainer = document.getElementById('cyber-hud-container');
        if (hudContainer) hudContainer.classList.add('hidden');

        const container = document.getElementById('cyber-game-container');
        if (container) container.classList.add('hidden');

        // รีเซ็ตภาพพื้นหลังให้กลับมามืดสลัวสวยงาม คลุมทับภาพประกอบด่านสุดท้าย เพื่อให้ตัวหนังสือในหน้าจอ Victory เด่นสง่า
        resetCyberBackground();

        const victory = document.getElementById('cyber-victory-screen');
        if (victory) victory.classList.remove('hidden');

        // จัดการหน้าจอ Victory
        const coinEl = document.getElementById('victory-coins-earned');
        if (coinEl) coinEl.textContent = earnedCoins;

        const xpEl = document.getElementById('victory-xp-earned');
        if (xpEl) xpEl.textContent = earnedXp;

        // สรุปสถานะ HP ที่เหลือ
        const shieldText = document.getElementById('victory-shield-status');
        if (shieldText) {
            if (cyberSafetyHp >= 100) {
                shieldText.textContent = '🛡️ เกราะผู้พิทักษ์สมบูรณ์แบบ 100% ไร้รอยขีดข่วน!';
                shieldText.className = 'text-lg font-black text-emerald-600 mt-2';
            } else if (cyberSafetyHp >= 50) {
                shieldText.textContent = `🛡️ เกราะผู้พิทักษ์คงเหลือ ${cyberSafetyHp}% ปลอดภัยค่อนข้างดี!`;
                shieldText.className = 'text-lg font-black text-blue-600 mt-2';
            } else {
                shieldText.textContent = `⚠️ เกราะผู้พิทักษ์อ่อนแอเหลือเพียง ${cyberSafetyHp}% เกือบไปแล้ว! ต้องระมัดระวังขึ้นนะ!`;
                shieldText.className = 'text-lg font-black text-orange-600 mt-2';
            }
        }

        // จัดเตรียมการยิง API อัปเดตข้อมูลขึ้น Google Sheets
        const btnSave = document.getElementById('cyber-btn-save-progress');
        if (btnSave) {
            btnSave.textContent = '💾 ยืนยันบันทึกผลและแต้มผู้กล้า';
            btnSave.disabled = false;
            btnSave.onclick = saveFinalCyberResult;
        }

        // เอฟเฟกต์พลุดอกไม้ไฟฉลองชัย
        if (typeof launchConfetti === 'function') launchConfetti();
    }

    /**
     * ส่งคะแนนบันทึกขึ้นระบบ Sheets จริง
     */
    function saveFinalCyberResult() {
        const btnSave = document.getElementById('cyber-btn-save-progress');
        if (btnSave) {
            btnSave.textContent = '⏳ กำลังส่งผลข้อมูล...';
            btnSave.disabled = true;
        }

        if (typeof google !== 'undefined') {
            google.script.run
                .withSuccessHandler(onSaveProgressSuccess)
                .withFailureHandler(onSaveProgressFailure)
                .saveCyberSafetyResult(currentUser.id, cyberSafetyHp, earnedCoins, earnedXp);
        } else {
            // จำลอง Mock บันทึกข้อมูล
            setTimeout(() => {
                // เพิ่มเหรียญและ EXP ลง User ในหน่วยความจำเครื่อง
                if (currentUser) {
                    currentUser.coins = (currentUser.coins || 0) + earnedCoins;
                    currentUser.xp = (currentUser.xp || 0) + earnedXp;
                    currentUser.level = Math.floor(currentUser.xp / 100) + 1;
                }

                // อัปเดต Topbar ทันที
                if (typeof updateDashboardStats === 'function') updateDashboardStats();

                onSaveProgressSuccess({ success: true, coins: (currentUser && currentUser.coins) || 0, xp: (currentUser && currentUser.xp) || 0, level: (currentUser && currentUser.level) || 1 });
            }, 1000);
        }
    }

    /**
     * บันทึกสำเร็จ
     */
    function onSaveProgressSuccess(res) {
        Swal.fire({
            title: '🎉 บันทึกผลสำเร็จ!',
            html: `ได้รับเหรียญ <b>+${earnedCoins} ⭐</b> และ XP <b>+${earnedXp}</b> เรียบร้อยแล้ว!`,
            icon: 'success',
            confirmButtonText: 'กลับหน้าเลือกโหมด',
            confirmButtonColor: '#10b981'
        }).then(() => {
            // อัปเดตข้อมูลฝั่ง Dashboard ทันที
            if (res.success && typeof refreshUserData === 'function') {
                refreshUserData();
            } else if (typeof updateDashboardStats === 'function') {
                updateDashboardStats();
            }
            exitCyberSafetyMode();
        });
    }

    /**
     * บันทึกข้อมูลล้มเหลว
     */
    function onSaveProgressFailure(err) {
        Swal.fire('บันทึกผิดพลาด', 'ไม่สามารถเข้าถึงแผ่นงาน Google Sheets ได้ แต่คะแนนการผ่านด่านจะแสดงในเซสชันของคุณชั่วคราว', 'warning').then(() => {
            exitCyberSafetyMode();
        });
    }

    /**
     * ปิดหน้าจอและออกจากโหมด
     */
    function exitCyberSafetyMode() {
        if (typeof playClickSound === 'function') playClickSound();
        showPage('lobby');
    }
