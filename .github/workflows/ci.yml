name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, typecheck, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: firebase-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run audit:prod
      - run: npm run build
      - run: npm run verify:dist

  rules:
    name: Firestore rules on emulator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: firebase-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run test:rules
